# Suburban testbed: masquerade rules for vmbr1
# Deploy to: /etc/network/interfaces.d/testbed-masquerade.conf
#
# Bridge definitions and addresses live in the PVE-managed interfaces file.
# This file adds only iptables masquerade hooks that PVE does not manage.

# IPv4: VM subnet to Comcast
iface vmbr1 inet manual
	post-up iptables -w -t nat -C POSTROUTING -s 10.240.200.0/24 -o vmbr0 -j MASQUERADE 2>/dev/null || iptables -w -t nat -A POSTROUTING -s 10.240.200.0/24 -o vmbr0 -j MASQUERADE
	post-down iptables -w -t nat -D POSTROUTING -s 10.240.200.0/24 -o vmbr0 -j MASQUERADE || true

# IPv6: VM subnet to Comcast, VM subnet to WireGuard, WireGuard return path
iface vmbr1 inet6 manual
	post-up ip6tables -w -t nat -C POSTROUTING -s 3d06:bad:b01:200::/56 -o vmbr0 -j MASQUERADE 2>/dev/null || ip6tables -w -t nat -A POSTROUTING -s 3d06:bad:b01:200::/56 -o vmbr0 -j MASQUERADE
	post-up ip6tables -w -t nat -C POSTROUTING -s 3d06:bad:b01:200::/56 -o wg0 -j MASQUERADE 2>/dev/null || ip6tables -w -t nat -A POSTROUTING -s 3d06:bad:b01:200::/56 -o wg0 -j MASQUERADE
	post-up ip6tables -w -t nat -C POSTROUTING -s 3d06:bad:b01:10::/64 -o vmbr1 -j MASQUERADE 2>/dev/null || ip6tables -w -t nat -A POSTROUTING -s 3d06:bad:b01:10::/64 -o vmbr1 -j MASQUERADE
	post-down ip6tables -w -t nat -D POSTROUTING -s 3d06:bad:b01:200::/56 -o vmbr0 -j MASQUERADE || true
	post-down ip6tables -w -t nat -D POSTROUTING -s 3d06:bad:b01:200::/56 -o wg0 -j MASQUERADE || true
	post-down ip6tables -w -t nat -D POSTROUTING -s 3d06:bad:b01:10::/64 -o vmbr1 -j MASQUERADE || true
