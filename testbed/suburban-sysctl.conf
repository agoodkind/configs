# Host-side forwarding for MWAN testbed
# Required for LXC failover (veth peers need forwarding enabled)
# Deploy to: /etc/sysctl.d/99-mwan-testbed.conf on suburban
net.ipv6.conf.all.forwarding=1
net.ipv6.conf.default.forwarding=1
net.ipv4.ip_forward=1

# Safe defaults for interfaces that appear after early boot. The suburban
# host's per-bridge RA policy is reconciled continuously by mwan-ifmgr.
net.ipv6.conf.default.accept_ra=0
net.ipv6.conf.default.autoconf=0
net.ipv6.conf.default.accept_ra_defrtr=0
