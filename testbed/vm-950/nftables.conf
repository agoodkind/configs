#!/usr/sbin/nftables -f
# MWAN testbed nftables configuration
# Adapted from production nftables.conf.j2

flush ruleset

# Interface names (matching production stable names)
define MGMT_IFACE = "enmgmt0"
define ATT_IFACE = "enatt0"
define WEBPASS_IFACE = "enwebpass0"
define INTERNAL_IFACE = "enmwanbr0"
define MB_IFACE = "enmbrains0"

# Internal network (mwan <-> OPNsense link)
define INTERNAL_NET = 10.250.250.0/29

table inet filter {
    chain input {
        type filter hook input priority filter; policy drop;

        # Allow established/related
        ct state established,related accept

        # Allow loopback
        iif lo accept

        # Allow ICMP
        ip protocol icmp accept
        ip6 nexthdr icmpv6 accept

        # Allow SSH from management network (eth0 = cloud-init name, enmgmt0 = stable name)
        iifname { $MGMT_IFACE, "eth0" } tcp dport 22 accept

        # Allow Consul gossip (Serf) from management network
        iifname { $MGMT_IFACE, "eth0" } tcp dport 8301 accept
        iifname { $MGMT_IFACE, "eth0" } udp dport 8301 accept

        # Allow mwan-agent gRPC (TCP) from hypervisor
        iifname { $MGMT_IFACE, "eth0" } tcp dport 50052 accept

        # Allow BGP and BFD from OPNsense on internal interface
        iifname $INTERNAL_IFACE tcp dport 179 accept
        iifname $INTERNAL_IFACE udp dport { 3784, 3785 } accept

        # Allow DHCP on WAN interfaces
        iifname $ATT_IFACE udp sport 67 udp dport 68 accept
        iifname $WEBPASS_IFACE udp sport 67 udp dport 68 accept
        iifname $ATT_IFACE udp sport 547 udp dport 546 accept
        iifname $WEBPASS_IFACE udp sport 547 udp dport 546 accept
        iifname $MB_IFACE udp sport 67 udp dport 68 accept
        iifname $MB_IFACE udp sport 547 udp dport 546 accept

        # Log dropped packets (rate limited)
        limit rate 1/second burst 5 packets log prefix "nftables input drop: " drop
    }

    chain forward {
        type filter hook forward priority filter; policy drop;

        # Allow established/related
        ct state established,related accept

        # Allow forwarding from internal to WANs
        iifname $INTERNAL_IFACE oifname { $ATT_IFACE, $WEBPASS_IFACE, $MB_IFACE } accept

        # Allow forwarding from WANs to internal (for inbound services)
        iifname { $ATT_IFACE, $WEBPASS_IFACE, $MB_IFACE } oifname $INTERNAL_IFACE accept

        # Log dropped packets (rate limited)
        limit rate 1/second burst 5 packets log prefix "nftables forward drop: " drop
    }

    chain output {
        type filter hook output priority filter; policy accept;
    }
}

table ip nat {
    chain prerouting {
        type nat hook prerouting priority dstnat; policy accept;
    }

    chain postrouting {
        type nat hook postrouting priority srcnat; policy accept;
        # Masquerade internal traffic via each WAN (testbed uses masquerade, not 1:1 NAT)
        oifname $ATT_IFACE ip saddr $INTERNAL_NET masquerade
        oifname $WEBPASS_IFACE ip saddr $INTERNAL_NET masquerade
        oifname $MB_IFACE ip saddr $INTERNAL_NET masquerade
    }
}

table ip6 nat {
    # NPT: internal /60 <-> simulated ISP PD /60s
    chain prerouting {
        type nat hook prerouting priority dstnat; policy accept;
        iifname $WEBPASS_IFACE ip6 daddr 3d06:bad:b01:220::/60 dnat prefix to 3d06:bad:b01:210::/60
        iifname $ATT_IFACE ip6 daddr 3d06:bad:b01:230::/60 dnat prefix to 3d06:bad:b01:210::/60
        iifname $MB_IFACE ip6 daddr 3d06:bad:b01:2400::/60 dnat prefix to 3d06:bad:b01:210::/60
    }

    chain postrouting {
        type nat hook postrouting priority srcnat; policy accept;
        oifname $WEBPASS_IFACE ip6 saddr 3d06:bad:b01:210::/60 snat prefix to 3d06:bad:b01:220::/60
        oifname $ATT_IFACE ip6 saddr 3d06:bad:b01:210::/60 snat prefix to 3d06:bad:b01:230::/60
        oifname $MB_IFACE ip6 saddr 3d06:bad:b01:210::/60 snat prefix to 3d06:bad:b01:2400::/60
    }
}

table inet mangle {
    set att_pinned_v4 {
        type ipv4_addr
        flags interval
        auto-merge
    }

    set att_pinned_v6 {
        type ipv6_addr
        flags interval
        auto-merge
    }

    chain prerouting {
        type filter hook prerouting priority mangle; policy accept;

        # Mark ingress WAN traffic for return path
        iifname $ATT_IFACE ct state new meta mark set 0x00000001
        iifname $WEBPASS_IFACE ct state new meta mark set 0x00000002
        iifname $MB_IFACE ct state new meta mark set 0x00000003

        # Pin latency-sensitive destinations to AT&T
        ip daddr @att_pinned_v4 meta mark set 0x00000001
        ip6 daddr @att_pinned_v6 meta mark set 0x00000001

        # Load balance OPNsense edge traffic between AT&T and Webpass
        ip6 saddr 3d06:bad:b01:201::2 ct state new meta mark set numgen random mod 2 map { 0 : 0x00000001, 1 : 0x00000002 }

        # Load balance internal /60 traffic between AT&T and Webpass
        ip6 saddr 3d06:bad:b01:210::/60 ct state new meta mark set numgen random mod 2 map { 0 : 0x00000001, 1 : 0x00000002 }

        # IPv4 load balance from internal network
        ip saddr $INTERNAL_NET ct state new meta mark set numgen random mod 2 map { 0 : 0x00000001, 1 : 0x00000002 }

        # Restore conntrack mark for established connections
        ct state established,related meta mark set ct mark
    }

    chain postrouting {
        type filter hook postrouting priority mangle; policy accept;
        ct mark set meta mark
    }
}
