# Deployed at /etc/systemd/journald.conf.d/10-mwan-retention.conf on vault.
# This file is a snapshot only. Vault has no Ansible coverage in this repo yet,
# so live edits on vault are the source of truth until vault is brought under
# Ansible. See plan: should-we-test-failover-happy-rocket.md, Task 1.
#
# Rationale:
#   * Default systemd journal retention is "as much as fits in 10% of disk"
#     with no time floor. That gives a fuzzy retention window. We want a
#     deterministic 90-day floor so cross-day incident retros (e.g. the
#     2026-04-27 OOB perceived-drop investigation) have data to look at.
#   * SystemMaxUse caps total disk so the journal cannot fill the volume.
#   * SystemKeepFree leaves headroom so other writes (PVE backups, etc.)
#     are not starved.

[Journal]
SystemMaxUse=8G
MaxRetentionSec=90day
SystemKeepFree=10G
