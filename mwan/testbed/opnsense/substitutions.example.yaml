# Example substitution table for `mwan opnsense-import-config`.
#
# This file is the operator-facing knob that drives the prod-to-testbed
# transform described in mwan/docs/MWAN-140-config-xml-transform-spec.md.
#
# Sections map to the spec:
#   device_names    -> spec section 2 (every <if>iavf0</if> reference)
#   xpath_sets      -> spec section 3.1, 3.2, 3.4, 3.6, 3.7 (per-element rewrites)
#   remove_elements -> spec section 3.5 (WireGuard peer strip option)
#   text_literals   -> spec section 3.3 (NAT source nets) and downstream
#                      hostname literals embedded in cert altNames or rules.
#
# MWAN-150 resolved most of the open questions in spec section 7 and the
# concrete answers live in `substitutions.yaml` next to this file. This
# file stays as the operator-facing reference and explains each decision
# so the reader can see the alternatives. Comments mark every value that
# was a design choice, with the picked default and the alternative.

device_names:
  - name: "MANAGEMENT and four VLAN parents: iavf0 to vtnet0"
    from: "iavf0"
    to:   "vtnet0"

xpath_sets:
  # Spec section 3.4: hostname and domain. Subdomain
  # `test.home.goodkind.io` avoids DNS collision with the prod router
  # record (resolved per spec section 7 default).
  - name: "hostname"
    xpath: "//opnsense/system/hostname"
    new_value: "router-test"
  - name: "domain"
    xpath: "//opnsense/system/domain"
    new_value: "test.home.goodkind.io"

  # Spec section 3.1: per-interface address rewrites.
  # MWAN-150 resolution: testbed reuses prod's WAN-side IPv4 subnet
  # `10.250.250.0/29`, so OPNsense WAN IPv4 stays at `10.250.250.2`. The
  # IPv6 side diverges: testbed uses `3d06:bad:b01:201::/64` for the
  # WAN-side internal link. Verified against suburban live state on
  # 2026-05-08 (vmbr2 = `10.250.250.5/29` and `3d06:bad:b01:201::5/64`).
  - name: "WAN ipv4 (unchanged from prod)"
    xpath: "//opnsense/interfaces/wan/ipaddr"
    new_value: "10.250.250.2"
  - name: "WAN ipv6"
    xpath: "//opnsense/interfaces/wan/ipaddrv6"
    new_value: "3d06:bad:b01:201::2"
  - name: "MANAGEMENT v4"
    xpath: "//opnsense/interfaces/opt9/ipaddr"
    new_value: "10.240.4.1"
  - name: "MANAGEMENT v6"
    xpath: "//opnsense/interfaces/opt9/ipaddrv6"
    new_value: "3d06:bad:b01:204::1"

  # Spec section 3.6: NAT64 / Tayga prefix.
  # MWAN-150 resolution: testbed uses `3d06:bad:b01:2664::/96` to keep
  # the prefix shape parallel to prod's `3d06:bad:b01:6464::/96` while
  # staying in the testbed `:200..2ff::` family. The xpath below targets
  # the canonical Tayga element (verified at lines 5083-5092 of the
  # redacted prod artifact). Embedded copies in firewall aliases and
  # rule networks are caught by the matching text_literals entry below.
  - name: "NAT64 / Tayga prefix"
    xpath: "//opnsense/OPNsense/tayga/general/v6prefix"
    new_value: "3d06:bad:b01:2664::/96"

  # Spec section 3.7: captive portal hostname.
  - name: "Captive portal hostname"
    xpath: "//opnsense/captiveportal/hostname"
    new_value: "captive"
  - name: "Captive portal domain"
    xpath: "//opnsense/captiveportal/domain"
    new_value: "test.home.goodkind.io"

remove_elements:
  # Spec section 3.5 / spec section 7 question 3.
  # MWAN-150 resolution: strip prod WireGuard peers. Testbed does not
  # need real upstream peers; an isolated tunnel that does not actually
  # connect anywhere is fine for parity exercises. Avoids the misrouted
  # handshake risk callout 3 in the MWAN-140 parity plan. The alternative
  # is to replace each peer with a testbed-only key set, which would
  # exercise more code paths but adds key-management overhead.
  - name: "WireGuard client peers (strip)"
    xpath: "//opnsense/OPNsense/wireguard/client/clients/client"
  - name: "WireGuard server peers (strip)"
    xpath: "//opnsense/OPNsense/wireguard/server/servers/server"

  # Spec section 3.8 / spec section 7 question 5.
  # MWAN-150 resolution: strip the inline TLS certs. OPNsense regenerates
  # a self-signed cert on first boot. The alternative is to rewrite the
  # CN and altNames to match the testbed domain, which preserves cert
  # state but embeds material that has no real chain of trust on testbed
  # anyway.
  - name: "Inline certs (strip)"
    xpath: "//opnsense/cert"

text_literals:
  # Spec section 3.3: NAT and outbound source-network rewrites. Per
  # MWAN-150 resolution, we deliberately do NOT shift `10.250.250.`
  # because testbed reuses prod's WAN-side `/29` subnet. The five VLAN
  # subnets (`10.250.{0,1,2,3,4}.x/24`) shift to `10.240.{0,1,2,3,4}.x`.
  - name: "PRIVILEGED v4 prefix shift"
    from: "10.250.1."
    to:   "10.240.1."
  - name: "GENERAL v4 prefix shift"
    from: "10.250.2."
    to:   "10.240.2."
  - name: "CAPTIVE v4 prefix shift"
    from: "10.250.3."
    to:   "10.240.3."
  - name: "MANAGEMENT v4 prefix shift"
    from: "10.250.4."
    to:   "10.240.4."
  - name: "VMNET v4 prefix shift"
    from: "10.250.0."
    to:   "10.240.0."

  # IPv6 prefix shifts. Order matters: longer or more specific must come
  # before shorter ones so a substring rewrite does not split a longer
  # literal into a corrupted value. The NAT64 prefix shift runs first to
  # catch embedded copies in firewall aliases and rule networks. The
  # IPv6OnlyVLAN `:64::` shift below is safe in either order because
  # `:64::` is not a substring of `:6464::`.
  - name: "v6 NAT64 prefix shift (catches embedded copies)"
    from: "3d06:bad:b01:6464::"
    to:   "3d06:bad:b01:2664::"
  - name: "v6 PRIVILEGED prefix shift"
    from: "3d06:bad:b01:1::"
    to:   "3d06:bad:b01:201::"
  - name: "v6 GENERAL prefix shift"
    from: "3d06:bad:b01:2::"
    to:   "3d06:bad:b01:202::"
  - name: "v6 CAPTIVE prefix shift"
    from: "3d06:bad:b01:3::"
    to:   "3d06:bad:b01:203::"
  - name: "v6 MANAGEMENT prefix shift"
    from: "3d06:bad:b01:4::"
    to:   "3d06:bad:b01:204::"
  - name: "v6 IPv6OnlyVLAN prefix shift"
    from: "3d06:bad:b01:64::"
    to:   "3d06:bad:b01:264::"
  - name: "v6 WAN prefix shift"
    from: "3d06:bad:b01:fe::"
    to:   "3d06:bad:b01:201::"
  - name: "v6 VMNET prefix shift"
    from: "3d06:bad:b01::"
    to:   "3d06:bad:b01:200::"

  # Spec section 3.4: hostname and domain literals embedded in cert CN,
  # SSH banners, alt-names, dnssearchdomain. Catches embedded copies the
  # xpath_sets entries above do not visit.
  - name: "domain literal"
    from: "home.goodkind.io"
    to:   "test.home.goodkind.io"

  # Spec section 3.7: captive portal FQDN literal mirrors the xpath_sets
  # entries. The captive FQDN runs first so the trailing `chaotic.dog`
  # rewrite below does not corrupt the FQDN.
  - name: "captive portal FQDN"
    from: "captive.chaotic.dog"
    to:   "captive.test.home.goodkind.io"
  - name: "chaotic.dog domain literal"
    from: "chaotic.dog"
    to:   "test.home.goodkind.io"

  # Spec section 3.9 / spec section 7 question 6.
  # MWAN-150 resolution: rely on the v6 prefix shifts above to rewrite
  # `agoodkind@3d06:bad:b01::110` to `agoodkind@3d06:bad:b01:200::110`
  # mechanically (via the v6 VMNET shift). Other prod operator addresses
  # (e.g. `agoodkind@3d06:bad:b01:10::8`,
  # `agoodkind@2604:5500:c271:6310:bad:b01:0:4`,
  # `agoodkind@10.250.1.245`) end up resolving to non-existent testbed
  # addresses after the shifts. That is acceptable for a testbed parity
  # exercise: the rules keep their shape so OPNsense exercises the same
  # code paths on import, and no operator matches them. The alternative
  # is to strip every <username>-bound rule outright; pick that if a
  # cleaner rule set matters more than parity with the prod rule shape.
