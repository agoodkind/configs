hostname = "suburban-testbed"
mwan_vmid = "950"
mwan_mgmt_addr = "3d06:bad:b01:200::950"
mwan_int_iface = "enmwanbr0"

[opnsense]
url = "https://192.168.1.1"
gateway_names = ["WAN_GW4", "WAN_GW6"]
api_key = "TESTBED_API_KEY"
api_secret = "TESTBED_API_SECRET"
insecure = true

[opnsense.bgp]
router_id = "10.250.250.2"

[[opnsense.bgp.neighbors]]
address = "10.250.250.3"
description = "VM950-IPv4"
preference = "primary"

[[opnsense.bgp.neighbors]]
address = "3d06:bad:b01:201::3"
description = "VM950-IPv6"
preference = "primary"

[[opnsense.bgp.neighbors]]
address = "10.250.250.4"
description = "LXC100-IPv4"
preference = "backup"

[[opnsense.bgp.neighbors]]
address = "3d06:bad:b01:201::4"
description = "LXC100-IPv6"
preference = "backup"

[watchdog]
vsock_cid = 950
vsock_port = 50051
mwan_agent_tcp_addr = "[3d06:bad:b01:200::950]:50052"

[bgp]
enabled = true
asn = 4200000001
router_id = "10.250.250.3"
keepalive_seconds = 3
hold_seconds = 9
listen_port = 179

[[bgp.neighbors]]
address = "10.250.250.2"

[[bgp.neighbors_v6]]
address = "3d06:bad:b01:201::2"

[bgp.announce]
ipv4 = ["0.0.0.0/0"]
ipv6 = ["::/0"]

[email]
smtp2go_api_key = "TESTBED_API_KEY"
alert_email = "alex@goodkind.io"
from = "mwan-testbed@goodkind.io"
subject_prefix = "[MWAN-suburban]"
min_level = "ERROR"
cooldown = "5m"
