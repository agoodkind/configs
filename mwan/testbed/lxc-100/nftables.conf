#!/usr/sbin/nftables -f
# LXC 100 (mwan-failover-test) nftables configuration

flush ruleset

define WAN_IFACE = "eth0"
define INTERNAL_IFACE = "eth1"
define INTERNAL_NET = 10.250.250.0/29

table inet filter {
    chain input {
        type filter hook input priority filter; policy drop;

        # Allow established/related
        ct state established,related accept

        # Allow loopback
        iif lo accept

        # Allow ICMP
        ip protocol icmp accept
        ip6 nexthdr icmpv6 accept

        # Allow SSH
        tcp dport 22 accept

        # Allow BGP and BFD from OPNsense on internal interface
        iifname $INTERNAL_IFACE tcp dport 179 accept
        iifname $INTERNAL_IFACE udp dport { 3784, 3785 } accept

        # Allow DHCP on WAN interface
        iifname $WAN_IFACE udp sport 67 udp dport 68 accept
        iifname $WAN_IFACE udp sport 547 udp dport 546 accept

        # Log dropped packets (rate limited)
        limit rate 1/second burst 5 packets log prefix "nftables input drop: " drop
    }

    chain forward {
        type filter hook forward priority filter; policy drop;

        # Allow established/related
        ct state established,related accept

        # Allow forwarding from internal to WAN
        iifname $INTERNAL_IFACE oifname $WAN_IFACE accept

        # Allow forwarding from WAN to internal
        iifname $WAN_IFACE oifname $INTERNAL_IFACE accept

        # Log dropped packets (rate limited)
        limit rate 1/second burst 5 packets log prefix "nftables forward drop: " drop
    }

    chain output {
        type filter hook output priority filter; policy accept;
    }
}

table ip nat {
    chain postrouting {
        type nat hook postrouting priority srcnat; policy accept;
        oifname $WAN_IFACE ip saddr $INTERNAL_NET masquerade
    }
}

table ip6 nat {
    chain postrouting {
        type nat hook postrouting priority srcnat; policy accept;
        oifname $WAN_IFACE masquerade
    }
}
