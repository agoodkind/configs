# network interface settings; autogenerated
# Please do NOT modify this file directly, unless you know what
# you're doing.
#
# If you want to manage parts of the network configuration manually,
# please utilize the 'source' or 'source-directory' directives to do
# so.
# PVE will preserve these directives, but will NOT read its network
# configuration from sourced files, so do not attempt to move any of
# the PVE managed interfaces into external files!

auto lo
iface lo inet loopback

iface nic0 inet manual

iface nic1 inet manual

auto vmbr0
iface vmbr0 inet static
	address 10.240.0.148/24
	gateway 10.240.0.1
	bridge-ports nic0
	bridge-stp off
	bridge-fd 0

iface vmbr0 inet6 auto
	accept_ra 2

source /etc/network/interfaces.d/*

auto vmbr1
iface vmbr1 inet static
	address 10.240.200.1/24
	bridge-ports none
	bridge-stp off
	bridge-fd 0

iface vmbr1 inet6 static
	address 3d06:bad:b01:200::1/64
	address fe80::1/64

# MWAN <-> OPNsense internal link
auto vmbr2
iface vmbr2 inet static
	address 10.250.250.5/29
	bridge-ports none
	bridge-stp off
	bridge-fd 0

iface vmbr2 inet6 static
	address 3d06:bad:b01:201::5/64

# OPNsense LAN
auto vmbr3
iface vmbr3 inet manual
	bridge-ports none
	bridge-stp off
	bridge-fd 0

# Simulated ISP bridges (bare L2, ISP LXCs own addresses)
auto vmbr4
iface vmbr4 inet manual
	bridge-ports none
	bridge-stp off
	bridge-fd 0

auto vmbr5
iface vmbr5 inet manual
	bridge-ports none
	bridge-stp off
	bridge-fd 0

auto vmbr6
iface vmbr6 inet manual
	bridge-ports none
	bridge-stp off
	bridge-fd 0
