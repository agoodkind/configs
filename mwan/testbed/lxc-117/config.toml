hostname = "mwan-failover-emul"

# ============================================================================
# Testbed LXC 117. True MWAN prod emulation. Mirrors prod LXC 116 with extras.
# ============================================================================
# Differences from prod LXC 116. Each is intentional and isolated to this file.
#
#   1. dhcp_v4 is true. Prod is false. Flipping here lets bridge_probe observe
#      lastDHCP and actually trigger its alert. Documented in MWAN-83.
#
#   2. No [agent] or [bgp] sections. This LXC has no eth1. It tests ifmgr only.
#      BGP failover coverage stays on LXC 100.
# ============================================================================

[ifmgr]
role = "lxc-failover-backup"
reconcile_interval = "60s"
log_file = "/var/log/mwan-ifmgr.log"
json_log_file = "/var/log/mwan-ifmgr.jsonl"

[ifmgr.iface.eth0]
name = "eth0"
dhcp_v4 = true
ra_solicit = true

[ifmgr.modules.slaac_health]
iface = "eth0"
degraded_after = "30s"
escalate_after = "90s"
alert_after = "300s"
max_toggles_per_hour = 4
probe_targets_v6 = ["2606:4700:4700::1111", "2001:4860:4860::8888"]

[ifmgr.modules.bridge_probe]
iface = "eth0"
no_signal_alert_after = "120s"

[ifmgr.modules.connectivity_probe]
iface = "eth0"
targets_v6 = ["2606:4700:4700::1111", "2001:4860:4860::8888"]
timeout = "2s"
unhealthy_after = "10s"

[ifmgr.modules.ra_lost]
iface = "eth0"
ra_lost_alert_after = "5m"

[ifmgr.modules.mainv4]
iface = "eth0"
