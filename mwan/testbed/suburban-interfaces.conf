# Append to /etc/network/interfaces on suburban
# Simulated ISP bridges for full MWAN testbed
# Each bridge acts as an ISP gateway with NAT to Comcast (vmbr0)

# Simulated Webpass (Google Fiber)
auto vmbr4
iface vmbr4 inet static
	address 10.240.204.1/24
	bridge-ports none
	bridge-stp off
	bridge-fd 0

	post-up iptables -w -t nat -C POSTROUTING -s 10.240.204.0/24 -o vmbr0 -j MASQUERADE 2>/dev/null || iptables -w -t nat -A POSTROUTING -s 10.240.204.0/24 -o vmbr0 -j MASQUERADE
	post-down iptables -w -t nat -D POSTROUTING -s 10.240.204.0/24 -o vmbr0 -j MASQUERADE || true

iface vmbr4 inet6 static
	address 3d06:bad:b01:220::1/60

	post-up ip6tables -w -t nat -C POSTROUTING -s 3d06:bad:b01:220::/60 -o vmbr0 -j MASQUERADE 2>/dev/null || ip6tables -w -t nat -A POSTROUTING -s 3d06:bad:b01:220::/60 -o vmbr0 -j MASQUERADE
	post-down ip6tables -w -t nat -D POSTROUTING -s 3d06:bad:b01:220::/60 -o vmbr0 -j MASQUERADE || true


