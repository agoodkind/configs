# Append to /etc/network/interfaces on suburban
# Simulated ISP bridges for full MWAN testbed
# Each bridge is a pure L2 segment -- no addresses, no NAT, no RA.
# ISP LXCs (200/201/202) handle gateway, masquerade, and PD routing.

# Simulated Webpass (Google Fiber)
auto vmbr4
iface vmbr4 inet manual
	bridge-ports none
	bridge-stp off
	bridge-fd 0

# Simulated AT&T
auto vmbr5
iface vmbr5 inet manual
	bridge-ports none
	bridge-stp off
	bridge-fd 0

# Simulated Monkeybrains
auto vmbr6
iface vmbr6 inet manual
	bridge-ports none
	bridge-stp off
	bridge-fd 0
