# Host-side forwarding for MWAN testbed
# Required for LXC failover (veth peers need forwarding enabled)
# Deploy to: /etc/sysctl.d/99-mwan-testbed.conf on suburban
net.ipv6.conf.all.forwarding=1
net.ipv6.conf.default.forwarding=1
net.ipv4.ip_forward=1

# ISP simulation bridges: never accept RAs on the hypervisor.
# LXCs 200/201/202 send RAs on these bridges for VM 950, but the
# hypervisor must not install those as default routes.
net.ipv6.conf.vmbr4.accept_ra=0
net.ipv6.conf.vmbr5.accept_ra=0
net.ipv6.conf.vmbr6.accept_ra=0
