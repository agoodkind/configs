hostname = "mwan-failover"

# The smtp2go_api_key is intentionally absent here. The mwan binary reads it
# from the SMTP2GO_API_KEY environment variable, which systemd loads from
# /etc/mwan/secrets.env via the EnvironmentFile= directive on each unit.
# Ansible renders /etc/mwan/secrets.env from the vault during deploy.
[email]
alert_email = "alex@goodkind.io"
from = "mwan@goodkind.io"
subject_prefix = "[MWAN-vault-failover]"
bind_iface = ""
min_level = "ERROR"
cooldown = "5m"

[agent]
vsock_port = 0
tcp_addr = "[::]:50052"
deploy_file = "/var/run/mwan-last-deploy"
log_file = "/var/log/mwan-agent.log"
debug = false

[bgp]
enabled = true
asn = 4200000001
router_id = "10.250.250.4"
next_hop_v6 = "3d06:bad:b01:fe::4"
keepalive_seconds = 3
hold_seconds = 9
listen_port = 179

[[bgp.neighbors]]
address = "10.250.250.2"

[[bgp.neighbors_v6]]
address = "3d06:bad:b01:fe::2"

[bgp.announce]
ipv4 = ["0.0.0.0/0"]
ipv6 = ["::/0"]

# ============================================================================
# ifmgr: lxc-failover-backup role (eth0/mbrains-side health management)
# ============================================================================
# Runs alongside the mwan-agent. Independent concerns:
#   - mwan-agent: BGP speaker over the eth1 (OPNsense) link.
#   - mwan-ifmgr: eth0 SLAAC health, RA monitoring, bridge-dangle alerting.
# ============================================================================

[ifmgr]
role = "lxc-failover-backup"
reconcile_interval = "60s"
log_file = "/var/log/mwan-ifmgr.log"
json_log_file = "/var/log/mwan-ifmgr.jsonl"

[ifmgr.iface.eth0]
name = "eth0"
dhcp_v4 = false  # Container ifupdown owns eth0 DHCP today; ifmgr only monitors.
ra_solicit = true

[ifmgr.modules.slaac_health]
iface = "eth0"
degraded_after = "30s"
escalate_after = "90s"
alert_after = "300s"
max_toggles_per_hour = 4
probe_targets_v6 = ["2606:4700:4700::1111", "2001:4860:4860::8888"]

[ifmgr.modules.bridge_probe]
iface = "eth0"
no_signal_alert_after = "120s"

[ifmgr.modules.connectivity_probe]
iface = "eth0"
targets_v6 = ["2606:4700:4700::1111", "2001:4860:4860::8888"]
timeout = "2s"
unhealthy_after = "10s"

[ifmgr.modules.ra_lost]
iface = "eth0"
ra_lost_alert_after = "5m"

# Email config inherited from the agent's [email] section if present;
# otherwise alerts go to journald only.
