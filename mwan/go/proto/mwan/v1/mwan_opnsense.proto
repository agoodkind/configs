syntax = "proto3";

package mwan.v1;

option go_package = "goodkind.io/mwan/gen/mwan/v1;mwanv1";

// OpnsenseService runs inside the OPNsense VM and is reached over a
// qemu virtio-serial Unix socket. There is no TLS and no application
// authentication; the security boundary is host access to the socket.
service OpnsenseService {
  rpc Version(VersionRequest) returns (VersionResponse);
  rpc Exec(stream ExecRequest) returns (stream ExecResponse);
  rpc XPathGet(XPathGetRequest) returns (stream XPathMatch);
  rpc XPathSet(XPathSetRequest) returns (XPathSetResponse);
  rpc XPathDelete(XPathDeleteRequest) returns (XPathDeleteResponse);
  rpc BackupConfigXML(BackupConfigXMLRequest) returns (BackupConfigXMLResponse);
  rpc StripGatewayV6(StripGatewayV6Request) returns (StripGatewayV6Response);
  rpc InjectGatewayV6(InjectGatewayV6Request) returns (InjectGatewayV6Response);
  rpc DeployStatus(DeployStatusRequest) returns (DeployStatusResponse);
  rpc Revert(RevertRequest) returns (RevertResponse);
  rpc StageBinary(StageBinaryRequest) returns (StageBinaryResponse);
  rpc RestartDaemon(RestartDaemonRequest) returns (RestartDaemonResponse);
}

// TransferService implements a tus-shaped resumable file transfer
// over a single bidi gRPC stream.
service TransferService {
  rpc Upload(stream UploadRequest) returns (stream UploadResponse);
  rpc Status(StatusRequest) returns (StatusResponse);
  rpc Cancel(CancelRequest) returns (CancelResponse);
}

message VersionRequest {}

message VersionResponse {
  string version = 1;
  string build_commit = 2;
  bool build_dirty = 3;
  string build_binhash = 4;
}

message ExecHeader {
  string command = 1;
  repeated string args = 2;
  bool sudo = 3;
  int32 timeout_seconds = 4;
}

message ExecCancel {}

message ExecRequest {
  oneof body {
    ExecHeader header = 1;
    bytes stdin_chunk = 2;
    bool stdin_close = 3;
    ExecCancel cancel = 4;
  }
}

message ExecTerminal {
  int32 exit_code = 1;
  int64 duration_ms = 2;
  bool stdout_truncated = 3;
  bool stderr_truncated = 4;
  bool timed_out = 5;
}

message ExecResponse {
  oneof body {
    bytes stdout_chunk = 1;
    bytes stderr_chunk = 2;
    ExecTerminal terminal = 3;
  }
}

message XPathMatch {
  string match = 1;
}

message XPathGetRequest {
  string expression = 1;
}

message XPathSetRequest {
  string expression = 1;
  string new_value = 2;
}

message XPathSetResponse {
  string backup_path = 1;
  int32 changed_count = 2;
}

message XPathDeleteRequest {
  string expression = 1;
}

message XPathDeleteResponse {
  string backup_path = 1;
  int32 deleted_count = 2;
}

message BackupConfigXMLRequest {
  string label = 1;
}

message BackupConfigXMLResponse {
  string backup_path = 1;
  int64 size_bytes = 2;
}

message StripGatewayV6Request {}

message StripGatewayV6Response {
  string backup_path = 1;
  bool changed = 2;
}

message InjectGatewayV6Request {
  string gateway_name = 1;
}

message InjectGatewayV6Response {
  string backup_path = 1;
  bool changed = 2;
}

message DeployStatusRequest {
  enum Mark {
    MARK_UNSPECIFIED = 0;
    MARK_HEALTHY = 1;
  }
  Mark mark = 1;
}

message DeployStatusResponse {
  string active_sha256 = 1;
  string previous_sha256 = 2;
  string health = 3;
  int64 deployed_at = 4;
}

message RevertRequest {}

message RevertResponse {
  string reverted_to_sha256 = 1;
}

// StageBinary verifies the previously staged binary's sha256, atomic-
// renames it into the active slot, swaps the previous slot, writes the
// deploy state file, and drops the pending-verify marker. It does NOT
// restart the daemon; the caller invokes RestartDaemon when it is
// ready for the new binary to take over.
message StageBinaryRequest {
  string staged_sha256 = 1;
  string version_str = 2;
}

message StageBinaryResponse {
  string previous_path = 1;
  string active_sha256 = 2;
}

// RestartDaemon initiates a clean shutdown of the running daemon. The
// daemon closes its yamux session via GoAway, exits the process, and
// the rc.d supervisor respawns it from the staged binary. The client
// observes the close immediately and reconnects on its next call.
message RestartDaemonRequest {}

message RestartDaemonResponse {}

// TransferDirection drives the byte flow inside the Upload stream.
// READ streams server to client; WRITE streams client to server.
enum TransferDirection {
  TRANSFER_DIRECTION_UNSPECIFIED = 0;
  TRANSFER_DIRECTION_READ = 1;
  TRANSFER_DIRECTION_WRITE = 2;
}

// FinishStep selects how the server finalizes a WRITE transfer.
//   REPLACE: temp file is renamed to target.
//   SNAPSHOT_THEN_REPLACE: snapshot existing target into a per-dir
//     backup directory, then rename temp into target.
//   STAGE: leave the temp file at <target>.staged for a later
//     CommitDeploy call.
enum FinishStep {
  FINISH_STEP_UNSPECIFIED = 0;
  FINISH_STEP_REPLACE = 1;
  FINISH_STEP_SNAPSHOT_THEN_REPLACE = 2;
  FINISH_STEP_STAGE = 3;
}

message TransferHeader {
  string path = 1;
  TransferDirection direction = 2;
  FinishStep finish_step = 3;
  string resume_transfer_id = 4;
  int64 resume_from_offset = 5;
  string label = 6;
  int64 total_size = 7;
}

message TransferDataChunk {
  int64 offset = 1;
  bytes data = 2;
}

message TransferFinal {
  string sha256_hex = 1;
}

message TransferCancel {}

message UploadRequest {
  oneof body {
    TransferHeader header = 1;
    TransferDataChunk data = 2;
    TransferFinal final = 3;
    TransferCancel cancel = 4;
  }
}

message TransferAck {
  string transfer_id = 1;
  int64 total_bytes = 2;
  bool resume_accepted = 3;
  int64 committed_offset = 4;
}

message TransferTerminal {
  string sha256_hex = 1;
  int64 total_bytes = 2;
  string backup_path = 3;
  int32 status_code = 4;
  string status_message = 5;
  string staged_path = 6;
}

// TransferDataAck paces the bidi Upload stream. The server emits one
// of these after every data chunk it writes; the client must receive
// it before sending the next chunk. Application-level stop-and-wait
// keeps the in-flight byte count bounded to one chunk so the FreeBSD
// virtio_console RX queue cannot overflow.
message TransferDataAck {
  int64 committed_offset = 1;
}

message UploadResponse {
  oneof body {
    TransferAck ack = 1;
    TransferDataChunk data = 2;
    TransferTerminal terminal = 3;
    TransferDataAck data_ack = 4;
  }
}

message StatusRequest {
  string transfer_id = 1;
}

message StatusResponse {
  string transfer_id = 1;
  bool exists = 2;
  int64 committed_offset = 3;
  int64 total_bytes = 4;
  string path = 5;
}

message CancelRequest {
  string transfer_id = 1;
}

message CancelResponse {
  bool was_present = 1;
}
