syntax = "proto3";

package mwan.v1;

option go_package = "goodkind.io/mwan/gen/mwan/v1;mwanv1";

// Chunk is the generic streaming envelope used by any RPC whose
// payload exceeds gRPC's per-message frame budget. A stream is
// strictly ordered as: ChunkHeader, zero or more data chunks,
// ChunkTrailer. The header and trailer always travel as their own
// Chunk messages (header.body / trailer.body); data chunks carry
// raw bytes via body.data.
message Chunk {
  oneof body {
    ChunkHeader  header  = 1;
    bytes        data    = 2;
    ChunkTrailer trailer = 3;
  }
}

// ChunkHeader is the first message of every chunked stream. It
// describes the shape of the payload and carries free-form
// per-RPC metadata in attrs (e.g. version_str for Deploy).
message ChunkHeader {
  string content_type = 1;  // free-form, e.g. "application/octet-stream", "application/xml"
  string label        = 2;  // free-form label, e.g. version string for Deploy
  int64  total_size   = 3;  // -1 if unknown
  map<string, string> attrs = 4; // per-RPC metadata
}

// ChunkTrailer is the last message of every chunked stream. The
// receiver verifies sha256_hex against its running hash of the
// data chunks; mismatch is a protocol error.
message ChunkTrailer {
  string sha256_hex = 1;
  int64  total_size = 2; // bytes summed across all data chunks
}
