## mwan-cutover config for production (vault)
## Deploy to: /etc/mwan-cutover/config.toml on vault
## DO NOT USE until suburban testbed passes all gates

hostname = "vault"

# VM 113 (primary MWAN)
mwan_vmid      = "113"
mwan_mgmt_addr = "3d06:bad:b01::113"
mwan_int_iface = "enmwanbr0"

# Pre-cutover state: fe::1 is the real address
current_real_ipv6 = "3d06:bad:b01:fe::1/64"
current_real_ipv4 = "10.250.250.1/29"

# Post-cutover: real moves to fe::3, fe::1 becomes VIP
new_real_ipv6 = "3d06:bad:b01:fe::3/64"
new_real_ipv4 = "10.250.250.3/29"
vip_ipv6      = "3d06:bad:b01:fe::1/64"
vip_ipv4      = "10.250.250.1/29"

# OPNsense (for NDP cache flush on rollback)
opnsense_addr   = "agoodkind@3d06:bad:b01::1"
opnsense_vip_v6 = "3d06:bad:b01:fe::1"

# Failover LXC 116
failover_lxc_id    = "116"
failover_lxc_iface = "eth1"

# keepalived
vrid             = 51
master_priority  = 150
backup_priority  = 50
advert_interval  = 1

# Verification + health check
ping_target_ipv6 = "2606:4700:4700::1111"
ping_target_ipv4 = "1.1.1.1"
ping_targets     = ["2606:4700:4700::1111", "2001:4860:4860::8888"]
curl_target      = "https://ifconfig.co/ip"

# Health check (triggers failover when internet unreachable)
health_check_interval = 10
health_check_weight   = -110
health_check_fall     = 3
health_check_rise     = 2

# Email
alert_email      = "alex@goodkind.io"
email_from       = "mwan-cutover@goodkind.io"
email_bind_iface = "mbrains"

# Timeouts
ssh_timeout_sec    = 10
verify_timeout_sec = 30
boot_wait_sec      = 35
