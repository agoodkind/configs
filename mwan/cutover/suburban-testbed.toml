## mwan-cutover config for suburban HA testbed
## Deploy to: /etc/mwan-cutover/config.toml on suburban

hostname = "suburban"

# VM 950 (primary, plays role of VM 113)
mwan_vmid      = "950"
mwan_mgmt_addr = "3d06:bad:b01:200::950"
mwan_int_iface = "ens20"

# Pre-cutover state: ::1 is the real address
current_real_ipv6 = "3d06:bad:b01:201::1/64"
current_real_ipv4 = "10.250.250.1/29"

# Post-cutover: real moves to ::3, ::1 becomes VIP
new_real_ipv6 = "3d06:bad:b01:201::3/64"
new_real_ipv4 = "10.250.250.3/29"
vip_ipv6      = "3d06:bad:b01:201::1/64"
vip_ipv4      = "10.250.250.1/29"

# Failover LXC 100
failover_lxc_id    = "100"
failover_lxc_iface = "eth1"

# keepalived
vrid             = 51
master_priority  = 150
backup_priority  = 50
advert_interval  = 1

# Verification
ping_target_ipv6 = "2606:4700:4700::1111"
ping_target_ipv4 = "1.1.1.1"
curl_target      = "https://ifconfig.co/ip"

# Email
alert_email = "alex@goodkind.io"
email_from  = "mwan-cutover-testbed@goodkind.io"

# Timeouts
ssh_timeout_sec    = 10
verify_timeout_sec = 30
boot_wait_sec      = 35
