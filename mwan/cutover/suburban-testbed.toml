## mwan-cutover config for suburban HA testbed
## Deploy to: /etc/mwan-cutover/config.toml on suburban

hostname = "suburban"

# VM 950 (primary, plays role of VM 113)
mwan_vmid      = "950"
mwan_mgmt_addr = "3d06:bad:b01:200::950"
mwan_int_iface = "ens20"

# Pre-cutover state: ::1 is the real address
current_real_ipv6 = "3d06:bad:b01:201::1/64"
current_real_ipv4 = "10.250.250.1/29"

# Post-cutover: real moves to ::3, ::1 becomes VIP
new_real_ipv6 = "3d06:bad:b01:201::3/64"
new_real_ipv4 = "10.250.250.3/29"
vip_ipv6      = "3d06:bad:b01:201::1/64"
vip_ipv4      = "10.250.250.1/29"

# OPNsense (for NDP cache flush on rollback)
opnsense_addr   = "root@192.168.1.1"
opnsense_vip_v6 = "3d06:bad:b01:201::1"

# Failover LXC 100
failover_lxc_id        = "100"
failover_lxc_iface     = "eth1"
failover_lxc_wan_iface = "eth0"
failover_default_gw6   = "fe80::aedb:48ff:fe76:b097"
failover_default_gw4   = "10.240.0.1"
failover_internal_pfx  = "3d06:bad:b01:201::/64"
failover_opnsense_ll   = "fe80::be24:11ff:fe07:a172"
failover_ipv4_return   = "10.250.250.0/29 via 10.250.250.2"

# keepalived
vrid             = 51
master_priority  = 150
backup_priority  = 50
advert_interval  = 1

# Verification + health check
ping_target_ipv6 = "2606:4700:4700::1111"
ping_target_ipv4 = "1.1.1.1"
ping_targets     = ["2606:4700:4700::1111", "2001:4860:4860::8888"]
curl_target      = "https://ifconfig.co/ip"

# Health check (triggers failover when internet unreachable)
health_check_interval = 10
health_check_weight   = -110
health_check_fall     = 3
health_check_rise     = 2

# Email
alert_email      = "alex@goodkind.io"
email_from       = "mwan-cutover-testbed@goodkind.io"
email_bind_iface = ""

# Timeouts
ssh_timeout_sec    = 10
verify_timeout_sec = 30
boot_wait_sec      = 35
