# Legacy SSH client algorithms for the ONT SFP stick management interface at
# 192.168.1.1. The stick runs an old BusyBox/Dropbear that only offers
# diffie-hellman-group1-sha1 kex, an ssh-rsa host key, and the 3des-cbc cipher,
# all disabled by default in modern OpenSSH. Scoped to this single LAN host so
# the weak crypto stays off globally.
Host 192.168.1.1
    KexAlgorithms +diffie-hellman-group1-sha1
    HostKeyAlgorithms +ssh-rsa
    PubkeyAcceptedAlgorithms +ssh-rsa
    Ciphers +3des-cbc
