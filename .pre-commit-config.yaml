repos:
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.18.0
    hooks:
      - id: gitleaks

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: check-added-large-files
        args: ['--maxkb=500']
      - id: check-yaml
        exclude: ^ansible/playbooks/requirements\.yml$  # Allow ansible-galaxy format
      - id: detect-private-key
      - id: trailing-whitespace
      - id: end-of-file-fixer

  - repo: local
    hooks:
      - id: mwan-lint
        name: mwan golangci-lint
        entry: bash -c 'cd mwan/go && golangci-lint run ./...'
        language: system
        files: 'mwan/go/.*\.go$'
