services:
  app:
    image: tack-server:latest
    build: .
    restart: unless-stopped
    dns:
      - 127.0.0.11
    ports:
      - "${PORT:-8000}:8000"
    environment:
      DATABASE_URL: postgres://${YUGABYTE_USER:?YUGABYTE_USER is required, set it in .env}:${YUGABYTE_PASSWORD:?YUGABYTE_PASSWORD is required, set it in .env}@yugabyte:5433/${YUGABYTE_DB:?YUGABYTE_DB is required, set it in .env}?sslmode=disable
      # Audit ledger pools. Each DSN is composed entirely from .env values;
      # if AUDIT_*_PASSWORD is unset the DSN auth fails fast and the audit
      # subsystem degrades to NoopRecorder until seed-audit-roles is run.
      AUDIT_WRITER_DSN: ${AUDIT_WRITER_DSN}
      AUDIT_READER_DSN: ${AUDIT_READER_DSN}
      AUDIT_REDACTOR_DSN: ${AUDIT_REDACTOR_DSN}
      FDB_CLUSTER_FILE: /etc/foundationdb/fdb.cluster
      MEILI_URL: http://meilisearch:7700
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY:-tack-dev-meili-key-change-in-prod}
      TEMPORAL_ADDRESS: temporal:7233
      PORT: 8000
      ENV: ${TACK_ENV:-development}
      LOG_LEVEL: ${LOG_LEVEL:-debug}
      LOG_MAX_BACKUPS: ${LOG_MAX_BACKUPS:-0}
      LOG_MAX_AGE_DAYS: ${LOG_MAX_AGE_DAYS:-0}
      LOG_MAX_SIZE_MB: ${LOG_MAX_SIZE_MB:-100}
      LOG_JSON_FILE: ${LOG_JSON_FILE:-/var/log/tack/app.jsonl}
      LOG_TEXT_FILE: ${LOG_TEXT_FILE:-/var/log/tack/app.log}
      AUDIT_SIGNING_KEY_PATH: ${AUDIT_SIGNING_KEY_PATH:-/etc/tack/audit-signing.pem}
      AUDIT_WAL_DIR: ${AUDIT_WAL_DIR:-/var/lib/tack/audit-wal}
    volumes:
      - /etc/foundationdb:/etc/foundationdb:ro
      - tack-logs:/var/log/tack
      # Audit ledger signing key. Generated once on the host with
      #   openssl genpkey -algorithm ed25519 -out /etc/tack/audit-signing.pem
      # The notarizer reuses it at every 60s tick; rotation is a follow-up.
      - /etc/tack:/etc/tack:ro
      - tack-audit-wal:/var/lib/tack/audit-wal
    depends_on:
      yugabyte:
        condition: service_healthy
      fdb:
        condition: service_healthy
      meilisearch:
        condition: service_healthy
      temporal:
        condition: service_healthy

  yugabyte:
    # 2024.2.x LTS is the first line that ships IPv6 support in yugabyted
    # (issue #24665). Do not advertise the current container IP: Docker Compose
    # service IPs are intentionally replaceable. Advertise the stable service
    # DNS name and let Docker resolve it to the current GUA on this IPv6-only
    # bridge.
    image: yugabytedb/yugabyte:2024.2.8.0-b85
    restart: unless-stopped
    command:
      - /bin/bash
      - -lc
      - |
        set -euo pipefail
        ADDR=yugabyte
        if ! getent ahostsv6 "$$ADDR" >/dev/null; then
          echo "yugabyte wrapper: no IPv6 address found for $$ADDR in NSS" >&2
          exit 1
        fi
        echo "yugabyte wrapper: advertising $$ADDR" >&2
        # --base_dir aims yugabyted at the persisted volume mount below.
        # Without it, yugabyted defaults to ~/var which is the container
        # overlay (lost on every recreate). This is THE reason a docker
        # compose down wipes the SQL side: 2026-04-28 incident.
        exec /home/yugabyte/bin/yugabyted start \
          --daemon=false \
          --base_dir=/home/yugabyte/var \
          --advertise_address="$$ADDR" \
          --listen="$$ADDR" \
          --tserver_flags="ysql_pg_conf_csv=max_connections=100"
    environment:
      YSQL_DB:       ${YUGABYTE_DB:?YUGABYTE_DB is required, set it in .env}
      YSQL_USER:     ${YUGABYTE_USER:?YUGABYTE_USER is required, set it in .env}
      YSQL_PASSWORD: ${YUGABYTE_PASSWORD:?YUGABYTE_PASSWORD is required, set it in .env}
    ports:
      - "5433:5433"
      - "7000:7000"
      - "9000:9000"
    volumes:
      - yugabyte-data:/home/yugabyte/var
    healthcheck:
      test:
        - CMD-SHELL
        - |
          ADDR=yugabyte
          PGPASSWORD=${YUGABYTE_PASSWORD:?} ysqlsh -h "$$ADDR" -p 5433 \
            -U ${YUGABYTE_USER:?} -d ${YUGABYTE_DB:?} -c 'SELECT 1' -t
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 60s

  fdb:
    # Version is set by tack's Makefile FDB_VERSION variable, also baked
    # into the Dockerfile build args and the Go bindings pin in go.mod.
    # Bump all three together via make update-fdb VERSION=...
    image: foundationdb/foundationdb:${FDB_VERSION:-7.4.6}
    restart: unless-stopped
    environment:
      FDB_NETWORKING_MODE: container
      FDB_PORT: "4500"
      FDB_PROCESS_CLASS: unset
    volumes:
      - fdb-data:/var/fdb
      - /etc/foundationdb:/etc/foundationdb
      # Patched fdb.bash with IPv6 bracket handling. See fdb-overlay/fdb.bash.
      - /root/tack/fdb-overlay/fdb.bash:/var/fdb/scripts/fdb.bash:ro
    healthcheck:
      test: ["CMD-SHELL", "fdbcli --exec 'status minimal' 2>&1 | grep -q 'available'"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

  meilisearch:
    image: getmeili/meilisearch:v1.12
    restart: unless-stopped
    environment:
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY:-tack-dev-meili-key-change-in-prod}
      MEILI_ENV: production
      # Inter-container DNS on this network resolves AAAA only. Without an
      # explicit v6 listen address, Meilisearch binds 0.0.0.0:7700 (v4 only)
      # and the app's connection to meilisearch:7700 fails on the GUA.
      MEILI_HTTP_ADDR: "[::]:7700"
    ports:
      - "7700:7700"
    volumes:
      - meili-data:/meili_data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://[::1]:7700/health | grep -q 'available'"]
      interval: 5s
      timeout: 5s
      retries: 10

  temporal-db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER:     temporal
      POSTGRES_PASSWORD: temporal
      POSTGRES_DB:       temporal
    volumes:
      - temporal-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U temporal"]
      interval: 5s
      timeout: 5s
      retries: 10

  temporal:
    image: temporalio/auto-setup:1.26.2
    restart: unless-stopped
    environment:
      DB:              postgres12
      DB_PORT:         5432
      POSTGRES_USER:   temporal
      POSTGRES_PWD:    temporal
      POSTGRES_SEEDS:  temporal-db
    ports:
      - "7233:7233"
    depends_on:
      temporal-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "tctl --address temporal:7233 cluster health 2>&1 | grep -q SERVING"]
      interval: 10s
      timeout: 10s
      retries: 15
      start_period: 30s

  temporal-ui:
    image: temporalio/ui:2.34.0
    restart: unless-stopped
    environment:
      TEMPORAL_ADDRESS: temporal:7233
    ports:
      - "8080:8080"
    depends_on:
      - temporal

volumes:
  yugabyte-data:
  fdb-data:
  meili-data:
  temporal-db-data:
  tack-logs:
  tack-audit-wal:

# IPv6-only bridge. The /96 is carved from the host's on-link /64 and
# NDP-proxied back onto eth0 by ndppd. Containers source out as real GUAs
# because gateway_mode_v6 is routed (no masquerade). Inter-container DNS
# returns AAAA only because enable_ipv4 is false. Do not flip back to
# dual-stack: that defeats the forced-v6 contract.
#
# tack_docker_v6_subnet and tack_docker_v6_gateway are set per-host in
# group_vars so prod and QA use their respective /96 allocations.
networks:
  default:
    enable_ipv6: true
    enable_ipv4: false
    driver_opts:
      com.docker.network.bridge.gateway_mode_v6: routed
    ipam:
      config:
        - subnet: {{ tack_docker_v6_subnet }}
          gateway: {{ tack_docker_v6_gateway }}
