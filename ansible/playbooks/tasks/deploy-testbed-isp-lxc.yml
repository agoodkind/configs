---
# Render and push config files to a single ISP LXC.
# Called from deploy-testbed.yml with loop_var: isp
#
# isp fields: id, name, pd_prefix, pd_len, v4_subnet, vm950_ll, dynamic_v4,
#   ia_na, slaac_prefix, v4_reservations (and v4_gateway/v4_pool/v4_dns/ia_na_pool
#   when dynamic_v4/ia_na). repo_root is set in the parent play.

- name: Render ISP templates to suburban /tmp
  ansible.builtin.template:
    src: "{{ repo_root }}/testbed/isp-lxc/{{ item.src }}"
    dest: "/tmp/isp-{{ isp.id }}-{{ item.name }}"
    mode: "0644"
  loop:
    - { src: kea-dhcp6.conf.j2, name: kea-dhcp6.conf }
    - { src: radvd.conf.j2, name: radvd.conf }
    - { src: nftables.conf.j2, name: nftables.conf }
    - { src: pd-route.service.j2, name: pd-route.service }

- name: Render ISP kea-dhcp4 config (dynamic-v4 ISPs only)
  ansible.builtin.template:
    src: "{{ repo_root }}/testbed/isp-lxc/kea-dhcp4.conf.j2"
    dest: "/tmp/isp-{{ isp.id }}-kea-dhcp4.conf"
    mode: "0644"
  when: isp.dynamic_v4 | bool

- name: Copy ISP sysctl to suburban /tmp
  ansible.builtin.copy:
    src: "{{ repo_root }}/testbed/isp-lxc/sysctl-isp.conf"
    dest: "/tmp/isp-{{ isp.id }}-sysctl-isp.conf"
    mode: "0644"

- name: Copy ISP kea-rebind helpers to suburban /tmp
  ansible.builtin.copy:
    src: "{{ repo_root }}/testbed/isp-lxc/{{ item }}"
    dest: "/tmp/isp-{{ isp.id }}-{{ item }}"
    mode: "0644"
  loop:
    - kea-rebind.sh
    - kea-rebind.service

- name: Push ISP configs into LXC
  ansible.builtin.command:
    cmd: >-
      pct push {{ isp.id }}
      /tmp/isp-{{ isp.id }}-{{ item.tmp }}
      {{ item.dest }}
  loop:
    - { tmp: kea-dhcp6.conf, dest: /etc/kea/kea-dhcp6.conf }
    - { tmp: radvd.conf, dest: /etc/radvd.conf }
    - { tmp: nftables.conf, dest: /etc/nftables.conf }
    - { tmp: pd-route.service, dest: /etc/systemd/system/pd-route.service }
    - { tmp: kea-rebind.service, dest: /etc/systemd/system/kea-rebind.service }
    - { tmp: sysctl-isp.conf, dest: /etc/sysctl.d/99-isp.conf }
  changed_when: true

- name: Push ISP kea-rebind watcher into LXC
  ansible.builtin.command:
    cmd: >-
      pct push {{ isp.id }}
      /tmp/isp-{{ isp.id }}-kea-rebind.sh
      /usr/local/sbin/kea-rebind
      --perms 0755
  changed_when: true

- name: Push ISP kea-dhcp4 config into LXC (dynamic-v4 ISPs only)
  ansible.builtin.command:
    cmd: >-
      pct push {{ isp.id }}
      /tmp/isp-{{ isp.id }}-kea-dhcp4.conf
      /etc/kea/kea-dhcp4.conf
  changed_when: true
  when: isp.dynamic_v4 | bool

- name: Clean up ISP temp files
  ansible.builtin.file:
    path: "/tmp/isp-{{ isp.id }}-{{ item }}"
    state: absent
  loop:
    - kea-dhcp6.conf
    - kea-dhcp4.conf
    - radvd.conf
    - nftables.conf
    - pd-route.service
    - kea-rebind.sh
    - kea-rebind.service
    - sysctl-isp.conf

- name: Apply ISP sysctl
  ansible.builtin.command:
    cmd: pct exec {{ isp.id }} -- sysctl --system
  changed_when: false
  failed_when: false

- name: Reload and enable ISP services
  ansible.builtin.command:
    cmd: >-
      pct exec {{ isp.id }} -- sh -c
      'systemctl daemon-reload
      && systemctl enable --now nftables kea-dhcp6-server radvd pd-route kea-rebind
      && systemctl restart nftables kea-dhcp6-server radvd pd-route kea-rebind'
  changed_when: true

- name: Enable and restart kea-dhcp4 (dynamic-v4 ISPs only)
  ansible.builtin.command:
    cmd: >-
      pct exec {{ isp.id }} -- sh -c
      'systemctl enable --now kea-dhcp4-server
      && systemctl restart kea-dhcp4-server'
  changed_when: true
  when: isp.dynamic_v4 | bool
