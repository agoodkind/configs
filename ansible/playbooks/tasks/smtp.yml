---
# Outbound SMTP wiring for a guest. Derive the per-host SMTP2GO user, provision
# or update it through the SMTP2GO API (idempotent add then edit) with a
# generated password, compute the From address from the hostname, and render
# /etc/msmtprc. Included by prep-guests.yml. Reads smtp_* and
# vault_smtp2go_api_key from group_vars. Set smtp_enabled to "0" to skip.
- name: Initialize SMTP working values
  ansible.builtin.set_fact:
    smtp_generated_pass: ""
    smtp2go_user_exists: false
    smtp_effective_user: ""
    smtp_effective_pass: ""
    smtp_effective_from: ""

- name: Compute SMTP username for this host
  ansible.builtin.set_fact:
    smtp_effective_user: >-
      host-{{
        service_hostname
        | lower
        | regex_replace('[^a-z0-9]+','-')
        | regex_replace('(^-+|-+$)','')
      }}
  when: (smtp_enabled | string) != '0'

- name: Generate random SMTP password
  ansible.builtin.set_fact:
    smtp_generated_pass: >-
      {{ lookup('password', '/dev/null length=32 chars=ascii_letters,digits') }}
  when: (smtp_enabled | string) != '0'

- name: Ensure SMTP2GO SMTP user exists (API add)
  ansible.builtin.uri:
    url: https://api.smtp2go.com/v3/users/smtp/add
    method: POST
    headers:
      Content-Type: application/json
      X-Smtp2go-Api-Key: "{{ vault_smtp2go_api_key }}"
    body_format: json
    body:
      username: "{{ smtp_effective_user }}"
      email_password: "{{ smtp_generated_pass }}"
      description: "Host {{ inventory_hostname }}"
      status: allowed
    return_content: true
    status_code: [200, 400, 409]
  register: smtp2go_add_user
  changed_when: (smtp2go_add_user.status | default(0)) == 200
  failed_when: >-
    (smtp2go_add_user.status | default(0)) not in [200, 400, 409]
    or
    (
      (smtp2go_add_user.status | default(0)) == 400
      and
      (
        (
          (smtp2go_add_user.json.data.error | default('') | lower)
          | regex_search('already have smtp user')
        ) == none
      )
    )
  when: (smtp_enabled | string) != '0'

- name: Detect if SMTP2GO SMTP user already exists (API semantics vary)
  ansible.builtin.set_fact:
    smtp2go_user_exists: >-
      {{
        (smtp2go_add_user is defined)
        and
        (
          (smtp2go_add_user.status | default(0)) == 409
          or
          (
            (smtp2go_add_user.status | default(0)) == 400
            and
            (
              (
                (smtp2go_add_user.json.data.error | default('') | lower)
                | regex_search('already have smtp user')
              ) != none
            )
          )
        )
      }}
  when:
    - (smtp_enabled | string) != '0'
    - smtp2go_add_user is defined

- name: Update SMTP2GO SMTP user password if user already exists (API edit)
  ansible.builtin.uri:
    url: https://api.smtp2go.com/v3/users/smtp/edit
    method: POST
    headers:
      Content-Type: application/json
      X-Smtp2go-Api-Key: "{{ vault_smtp2go_api_key }}"
    body_format: json
    body:
      username: "{{ smtp_effective_user }}"
      email_password: "{{ smtp_generated_pass }}"
      status: allowed
    return_content: true
    status_code: [200]
  when:
    - (smtp_enabled | string) != '0'
    - smtp2go_user_exists

- name: Set effective SMTP password (generated)
  ansible.builtin.set_fact:
    smtp_effective_pass: "{{ smtp_generated_pass }}"
  when: (smtp_enabled | string) != '0'

- name: Compute SMTP From address (derived from hostname)
  ansible.builtin.set_fact:
    smtp_effective_from: "{{ service_hostname.split('.')[0] }}@{{ smtp_from_domain }}"
  when: (smtp_enabled | string) != '0'

- name: Deploy /etc/msmtprc
  ansible.builtin.copy:
    dest: /etc/msmtprc
    mode: "0600"
    content: |
      defaults
      auth           on
      tls            on
      tls_starttls   on
      tls_trust_file /etc/ssl/certs/ca-certificates.crt
      logfile        /var/log/msmtp.log

      account smtp2go
      host {{ smtp_host }}
      port {{ smtp_port }}
      user {{ smtp_effective_user }}
      auth           login
      password {{ smtp_effective_pass }}
      from {{ smtp_effective_from }}

      account default : smtp2go
  when:
    - (smtp_enabled | string) != '0'
    - (smtp_effective_user | trim) | length > 0
    - (smtp_effective_pass | trim) | length > 0
    - (smtp_effective_from | trim) | length > 0
