---
# In-guest install of mwan-opnsense.
#
# Target: an OPNsense host reached as `agoodkind` with sudo. The
# hypervisor-side virtio-serial-pci args change is a one-time manual
# step (see plan: V0-S9 / MWAN-99). This task only does the in-guest
# install and assumes the device is already wired.
#
# Required vars (typically from group_vars or playbook):
#   mwan_opnsense_binary_local       local path to bin/mwan-opnsense
#
# Optional vars (with sensible defaults):
#   mwan_opnsense_listen_serial      default "/dev/ttyV0.1"

- name: Install mwan-opnsense binary
  ansible.builtin.copy:
    src: "{{ mwan_opnsense_binary_local }}"
    dest: /usr/local/sbin/mwan-opnsense
    owner: root
    group: wheel
    mode: "0755"
  become: true
  notify: restart mwan_opnsense

- name: Install rc.d script
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../../mwan/go/cmd/mwan-opnsense/src/etc/rc.d/mwan_opnsense"
    dest: /usr/local/etc/rc.d/mwan_opnsense
    owner: root
    group: wheel
    mode: "0755"
  become: true
  notify: restart mwan_opnsense

- name: Install rc.conf.d settings
  ansible.builtin.template:
    src: "{{ playbook_dir }}/../../mwan/go/cmd/mwan-opnsense/src/etc/rc.conf.d/mwan_opnsense.sample"
    dest: /etc/rc.conf.d/mwan_opnsense
    owner: root
    group: wheel
    mode: "0644"
  become: true
  notify: restart mwan_opnsense

- name: Install loader.conf.d entry (virtio_console autoload)
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../../mwan/go/cmd/mwan-opnsense/src/boot/loader.conf.d/mwan_opnsense.conf"
    dest: /boot/loader.conf.d/mwan_opnsense.conf
    owner: root
    group: wheel
    mode: "0644"
  become: true

- name: Enable mwan_opnsense in rc.conf
  ansible.builtin.lineinfile:
    path: /etc/rc.conf
    line: 'mwan_opnsense_enable="YES"'
    create: false
  become: true
  notify: restart mwan_opnsense
