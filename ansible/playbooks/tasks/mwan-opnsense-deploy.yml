---
# In-guest install of mwan-opnsense.
#
# Target: an OPNsense host reached as `agoodkind` with sudo. The
# hypervisor-side virtio-serial-pci args field must already be wired. This task
# only does the in-guest install.
#
# Required vars (typically from group_vars or playbook):
#   mwan_opnsense_binary_local       local path to bin/mwan-opnsense
#
# Optional rc.conf.d overrides after install. Defaults come from the sample
# copied below.
#   mwan_opnsense_listen_serial      default "/dev/ttyV0.1"
#   mwan_opnsense_baud               default "115200"
#   mwan_opnsense_config_xml         default "/conf/config.xml"
#   mwan_opnsense_backup_dir         default "/conf/backup"
#   mwan_opnsense_logfile            default "/var/log/mwan-opnsense.log"
#   mwan_opnsense_state_dir          default "/var/lib/mwan/transfers"
#   mwan_opnsense_stop_timeout       default "10"

- name: Install mwan-opnsense binary as .current
  ansible.builtin.copy:
    src: "{{ mwan_opnsense_binary_local }}"
    dest: /usr/local/sbin/mwan-opnsense.current
    owner: root
    group: wheel
    mode: "0755"
  become: true

# /usr/local/sbin/mwan-opnsense always points at the active binary.
# Self-deploy RPC swaps .current atomically; the symlink stays put.
- name: Symlink mwan-opnsense to .current
  ansible.builtin.file:
    src: mwan-opnsense.current
    dest: /usr/local/sbin/mwan-opnsense
    state: link
    owner: root
    group: wheel
  become: true

- name: Install rc.d script
  ansible.builtin.copy:
    src: >-
      {{ playbook_dir }}/../../mwan/go/cmd/mwan/opnsense-src/etc/rc.d/mwan_opnsense
    dest: /usr/local/etc/rc.d/mwan_opnsense
    owner: root
    group: wheel
    mode: "0755"
  become: true

# The supervised entry point for daemon(8) -r. rc.d launches this shim, which
# runs the deploy preflight (revert a bad self-deploy to .previous) before
# exec'ing the daemon on every (re)spawn.
- name: Install mwan-opnsense-run preflight shim
  ansible.builtin.copy:
    src: >-
      {{ playbook_dir }}/../../mwan/go/cmd/mwan/opnsense-src/usr/local/libexec/mwan-opnsense-run
    dest: /usr/local/libexec/mwan-opnsense-run
    owner: root
    group: wheel
    mode: "0755"
  become: true

- name: Install rc.conf.d settings
  ansible.builtin.copy:
    src: >-
      {{ playbook_dir }}/../../mwan/go/cmd/mwan/opnsense-src/etc/rc.conf.d/mwan_opnsense.sample
    dest: /etc/rc.conf.d/mwan_opnsense
    owner: root
    group: wheel
    mode: "0644"
  become: true

- name: Install loader.conf.d entry (virtio_console autoload)
  ansible.builtin.copy:
    src: >-
      {{ playbook_dir }}/../../mwan/go/cmd/mwan/opnsense-src/boot/loader.conf.d/mwan_opnsense.conf
    dest: /boot/loader.conf.d/mwan_opnsense.conf
    owner: root
    group: wheel
    mode: "0644"
  become: true

- name: Enable mwan_opnsense in rc.conf
  ansible.builtin.lineinfile:
    path: /etc/rc.conf
    regexp: '^mwan_opnsense_enable='
    line: 'mwan_opnsense_enable="YES"'
    create: false
  become: true

- name: Check mwan_opnsense service status
  ansible.builtin.command:
    argv:
      - /usr/local/etc/rc.d/mwan_opnsense
      - status
  register: mwan_opnsense_service_status
  changed_when: false
  failed_when: >-
    mwan_opnsense_service_status.rc not in [0, 1]
  when: not ansible_check_mode
  become: true

- name: Start mwan_opnsense when stopped
  ansible.builtin.service:
    name: mwan_opnsense
    state: started
  when:
    - not ansible_check_mode
    - mwan_opnsense_service_status.rc == 1
  become: true
