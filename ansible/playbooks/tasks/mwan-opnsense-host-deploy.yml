---
# Linux-side deploy of the mwan opnsense host bridge subcommand.
#
# Target: a Proxmox host that runs an OPNsense VM, reached as root.
# Pairs with mwan-opnsense-deploy.yml which installs the daemon
# inside the OPNsense guest. See mwan/MWAN-95-INVESTIGATION.md.
#
# Required vars:
#   mwan_opnsense_host_binary_local      local path to bin/mwan-linux
#   mwan_opnsense_host_upstream          unix:///var/run/qemu-server/<vmid>.mwanrpc
#
# Optional vars (with defaults):
#   mwan_opnsense_host_listen_path       default "/var/run/mwan-opnsense.sock"
#   mwan_opnsense_host_reconnect         default "2s"
#   mwan_opnsense_host_hb_interval       default "30s"
#   mwan_opnsense_host_hb_timeout        default "10s"

- name: Install mwan monolith binary
  ansible.builtin.copy:
    src: "{{ mwan_opnsense_host_binary_local }}"
    dest: /usr/local/bin/mwan
    owner: root
    group: root
    mode: "0755"
  become: true
  register: mwan_opnsense_host_binary

- name: Install systemd unit
  ansible.builtin.copy:
    src: >-
      {{ playbook_dir }}/../../mwan/go/cmd/mwan/mwan-opnsense-host.service
    dest: /etc/systemd/system/mwan-opnsense-host.service
    owner: root
    group: root
    mode: "0644"
  become: true
  register: mwan_opnsense_host_unit

- name: Ensure /etc/mwan exists
  ansible.builtin.file:
    path: /etc/mwan
    state: directory
    owner: root
    group: root
    mode: "0755"
  become: true

- name: Template [opnsense.host] into /etc/mwan/config.toml
  ansible.builtin.copy:
    dest: /etc/mwan/config.toml
    owner: root
    group: root
    mode: "0644"
    content: |
      # Managed by ansible/playbooks/tasks/mwan-opnsense-host-deploy.yml.
      # The host bridge reads every input from this section.
      hostname = "{{ inventory_hostname }}"

      [opnsense.host]
      upstream = "{{ mwan_opnsense_host_upstream }}"
      listen = "{{ mwan_opnsense_host_listen_path | default('/var/run/mwan-opnsense.sock') }}"
      reconnect = "{{ mwan_opnsense_host_reconnect | default('2s') }}"
      heartbeat_interval = "{{ mwan_opnsense_host_hb_interval | default('30s') }}"
      heartbeat_timeout = "{{ mwan_opnsense_host_hb_timeout | default('10s') }}"
  become: true
  register: mwan_opnsense_host_toml

- name: Reload systemd if anything changed
  ansible.builtin.systemd:
    daemon_reload: true
  become: true
  when: >-
    mwan_opnsense_host_unit.changed

- name: Enable and start mwan-opnsense-host
  ansible.builtin.systemd:
    name: mwan-opnsense-host
    enabled: true
    state: started
  become: true

- name: Restart mwan-opnsense-host if binary, unit, or TOML changed
  ansible.builtin.systemd:
    name: mwan-opnsense-host
    state: restarted
  become: true
  when: >-
    mwan_opnsense_host_binary.changed
    or mwan_opnsense_host_unit.changed
    or mwan_opnsense_host_toml.changed
