---
# Register an OpenTofu-created service container in inventory, then the importing
# deploy runs the inside setup. OpenTofu owns the LXC, its creation and sizing.
# Ansible owns what runs inside it.
#
# Required variables, provided by the importing deploy via import_playbook vars:
#   container_group: the service inventory group to register the host into,
#                    for example consul_servers.
#   group_vars_file: path to the service group_vars, which define
#                    service_hostname and service_ipv6_address from service_mapping.
- name: Register the OpenTofu-created service container in inventory
  hosts: localhost
  gather_facts: false
  vars_files:
    - "{{ playbook_dir }}/../inventory/group_vars/all/service_mapping.yml"
    - "{{ group_vars_file }}"
  tasks:
    - name: Add the container to its service inventory group
      ansible.builtin.add_host:
        name: "{{ service_hostname }}"
        groups: "{{ container_group }}"
        ansible_host: "{{ service_ipv6_address | ansible.utils.ipaddr('address') }}"
        ansible_user: root
        ansible_ssh_common_args: >-
          -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null
