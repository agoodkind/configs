---
# ============================================================================
# MWAN Testbed Deployment (suburban)
# ============================================================================
# Mirrors deploy-mwan.yml but targets the suburban testbed.
# Uses the SAME .j2 templates as production with testbed-specific group vars.
# VMs and LXCs must already exist.
#
# Usage:
#   bash -c "cd /Users/agoodkind/Sites/configs/ansible && ansible-playbook \
#     --vault-password-file ~/.config/ansible/vault.pass \
#     playbooks/deploy-mwan-testbed.yml"
# ============================================================================

# --- Add testbed hosts to inventory ---
- name: Add testbed hosts to inventory
  hosts: localhost
  gather_facts: false
  vars_files:
    - ../inventory/group_vars/all/service_mapping.yml
    - ../inventory/group_vars/mwan_testbed_servers.yml
  tasks:
    - name: Add suburban hypervisor
      ansible.builtin.add_host:
        name: suburban
        ansible_host: "10.240.0.148"
        ansible_user: root
        ansible_ssh_common_args: "-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null"
      tags: ["always"]

    - name: Add VM 950 (test-mwan)
      ansible.builtin.add_host:
        name: test-mwan
        groups: mwan_testbed_servers
        ansible_host: "3d06:bad:b01:200::950"
        ansible_user: root
        ansible_ssh_common_args: "-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null"
        ansible_proxmox_vmid: "950"
        ansible_proxmox_host: suburban
      tags: ["always"]

    - name: Add LXC 100 (mwan-failover-test)
      # eth0 is now DHCP on vmbr6 (mirroring prod LXC 116). eth1 keeps its
      # static OPNsense-side address 3d06:bad:b01:201::4 which is stable.
      ansible.builtin.add_host:
        name: mwan-failover-test
        groups: mwan_testbed_servers
        ansible_host: "3d06:bad:b01:201::4"
        ansible_user: root
        ansible_ssh_common_args: "-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null"
        ansible_proxmox_vmid: "100"
        ansible_proxmox_host: suburban
      tags: ["always"]

# --- Prep guests (SSH keys, base packages) ---
# Uncomment when running on fresh guests. Already completed for VM 950 and LXC 100.
# - name: Prepare testbed guests
#   ansible.builtin.import_playbook: prep-guests.yml
#   vars:
#     target_hosts: mwan_testbed_servers

# --- Suburban hypervisor ---
- name: Configure suburban hypervisor
  hosts: suburban
  become: false
  vars_files:
    - ../inventory/group_vars/all/vars.yml
    - ../inventory/group_vars/all/vault.yml
    - ../inventory/group_vars/mwan_testbed_servers.yml
  vars:
    repo_root: "{{ playbook_dir | dirname | dirname }}"
  tasks:
    - name: Build mwan binary (local)
      ansible.builtin.shell:
        cmd: |
          set -euo pipefail
          cd "{{ repo_root }}/mwan/go"
          make build-linux
        executable: /bin/bash
      delegate_to: localhost
      changed_when: true

    - name: Deploy mwan binary
      ansible.builtin.copy:
        src: "{{ repo_root }}/mwan/go/bin/mwan-linux"
        dest: /usr/local/bin/mwan
        mode: "0755"

    - name: Create mwan config directory
      ansible.builtin.file:
        path: /etc/mwan
        state: directory
        mode: "0755"

    - name: Deploy hypervisor config (rendered from .j2)
      ansible.builtin.template:
        src: "{{ repo_root }}/mwan/config/config.toml.j2"
        dest: /etc/mwan/config.toml
        mode: "0600"

    - name: Deploy sysctl
      ansible.builtin.copy:
        src: "{{ repo_root }}/testbed/suburban-sysctl.conf"
        dest: /etc/sysctl.d/99-mwan-testbed.conf
        mode: "0644"
      notify: Reload sysctl

    - name: Deploy masquerade sourced file
      ansible.builtin.copy:
        src: "{{ repo_root }}/testbed/suburban-interfaces.d-testbed-masquerade.conf"
        dest: /etc/network/interfaces.d/testbed-masquerade.conf
        mode: "0644"

    # --- VM args (MWAN-154 owns the args field on suburban testbed VMs) ---
    # The Proxmox API rejects writes to the `args` field for any actor
    # other than the bare `root@pam` user. API tokens cannot bypass this.
    # See `mwan/docs/proxmox-args-privilege-research-2026-05-08.md` for the
    # full write-up. Tofu no longer declares `kvm_arguments` on VM 950 or
    # VM 102; these tasks set the live `args` string instead. Each task
    # only runs `qm set` when the live config does not already match.
    # `args` only takes effect at QEMU process start, so a change here
    # requires a cold reboot of the affected VM.

    - name: Read current VM 950 args (MWAN-143)
      ansible.builtin.command:
        cmd: qm config 950
      register: vm_950_config
      changed_when: false
      check_mode: false
      tags: ["args"]

    - name: Set vsock device on VM 950 args (MWAN-143)
      ansible.builtin.command:
        cmd: qm set 950 --args "-device vhost-vsock-pci,guest-cid=950"
      when: >-
        vm_950_config.stdout is not search('args:\s*-device\s+vhost-vsock-pci,guest-cid=950')
      register: vm_950_args_set
      changed_when: vm_950_args_set is not skipped and vm_950_args_set.rc == 0
      tags: ["args"]

    - name: Note that VM 950 needs a cold reboot when args changed
      ansible.builtin.debug:
        msg: >-
          VM 950 args were updated. The vsock device only attaches on a
          fresh QEMU process. Stop and start VM 950 (qm stop 950 then qm
          start 950) for the new args to take effect.
      when: vm_950_args_set is changed
      tags: ["args"]

    - name: Read current VM 102 args (MWAN-149)
      ansible.builtin.command:
        cmd: qm config 102
      register: vm_102_config
      changed_when: false
      failed_when: false
      check_mode: false
      tags: ["args"]

    - name: Set mwanrpc chardev on VM 102 args (MWAN-149)
      # The expected args string carries the virtio-serial-pci controller,
      # the chardev that bridges to /var/run/qemu-server/102.mwanrpc, and
      # the virtserialport that exposes the chardev as
      # /dev/ttyV0.0 inside the guest. The regex below pins the three
      # device IDs (mwanrpc, mwanchr, the chardev path 102.mwanrpc) so
      # the task is idempotent across whitespace differences.
      ansible.builtin.command:
        cmd: >-
          qm set 102 --args "-device virtio-serial-pci,id=mwanrpc -chardev
          socket,id=mwanchr,path=/var/run/qemu-server/102.mwanrpc,server=on,wait=off
          -device virtserialport,chardev=mwanchr,name=io.goodkind.mwan-opnsense.0"
      when: >-
        vm_102_config.rc == 0
        and (vm_102_config.stdout is not search('id=mwanrpc')
             or vm_102_config.stdout is not search('path=/var/run/qemu-server/102\.mwanrpc')
             or vm_102_config.stdout is not search('name=io\.goodkind\.mwan-opnsense\.0'))
      register: vm_102_args_set
      changed_when: vm_102_args_set is not skipped and vm_102_args_set.rc == 0
      tags: ["args"]

    - name: Note that VM 102 needs a cold reboot when args changed
      ansible.builtin.debug:
        msg: >-
          VM 102 args were updated. The mwanrpc chardev only attaches on a
          fresh QEMU process. Stop and start VM 102 (qm stop 102 then qm
          start 102) for the new args to take effect.
      when: vm_102_args_set is changed
      tags: ["args"]

    # --- ISP LXCs (200/201/202) via pct ---

    - name: Install packages on ISP LXCs
      ansible.builtin.command:
        cmd: >-
          pct exec {{ item.id }} -- sh -c
          'which kea-dhcp6 >/dev/null 2>&1 ||
           (apt-get update -qq && apt-get install -y -qq kea-dhcp6-server radvd nftables)'
      loop: "{{ testbed_isp_lxcs }}"
      changed_when: false

    - name: Render and push ISP LXC configs
      ansible.builtin.include_tasks: tasks/deploy-testbed-isp-lxc.yml
      loop: "{{ testbed_isp_lxcs }}"
      loop_control:
        loop_var: isp

  handlers:
    - name: Reload sysctl
      ansible.builtin.command: sysctl --system
      changed_when: false

# --- VM 950 (test-mwan) ---
- name: Configure VM 950
  hosts: test-mwan
  become: false
  vars_files:
    - ../inventory/group_vars/all/vars.yml
    - ../inventory/group_vars/all/vault.yml
    - ../inventory/group_vars/mwan_testbed_servers.yml
  vars:
    repo_root: "{{ playbook_dir | dirname | dirname }}"
    # Variables expected by the management interface templates
    vm_mgmt_iface: "{{ mwan_mgmt_iface }}"
    vm_mgmt_mac: "{{ mwan_mgmt_mac }}"
    vm_mgmt_ipv6: "3d06:bad:b01:200::950"
    vm_mgmt_ipv6_prefix: "64"
    vm_mgmt_dns_servers: "{{ mwan_dns_servers }}"
    vm_mgmt_dns_domain: "{{ mwan_dns_domain }}"
    vm_mgmt_gateway6: "fe80::1"
    hostname: "{{ service_hostname }}"
  tasks:
    - name: Create directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        mode: "0755"
      loop:
        - /etc/mwan
        - /etc/systemd/network
        - /etc/iproute2
        - /etc/sysctl.d

    - name: Remove netplan (conflicts with systemd-networkd link files)
      ansible.builtin.apt:
        name: netplan.io
        state: absent

    - name: Remove netplan runtime configs
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        - /etc/netplan
        - /run/systemd/network/10-netplan-eth0.link
        - /run/systemd/network/10-netplan-eth0.network

    - name: Install packages (matches production deploy-mwan.yml)
      ansible.builtin.apt:
        name:
          - nftables
          - iproute2
          - iptables
          - bash
          - curl
          - jq
          - vlan
          - bridge-utils
          - networkd-dispatcher
          - telnet
          - sipcalc
          - ipcalc-ng
          - ipcalc
          - ipv6calc
          - fping
        state: present

    - name: Deploy mwan binary
      ansible.builtin.copy:
        src: "{{ repo_root }}/mwan/go/bin/mwan-linux"
        dest: /usr/local/bin/mwan
        mode: "0755"

    - name: Deploy agent config (rendered from .j2)
      ansible.builtin.template:
        src: "{{ repo_root }}/mwan/config/config.toml.j2"
        dest: /etc/mwan/config.toml
        mode: "0600"

    # The mwan-agent unit loads this file via EnvironmentFile=. SMTP2GO_API_KEY
    # is read by internal/config/config.go and overrides smtp2go_api_key in
    # /etc/mwan/config.toml when set.
    - name: Deploy MWAN secrets environment file (VM 950)
      ansible.builtin.copy:
        dest: /etc/mwan/secrets.env
        content: |
          SMTP2GO_API_KEY={{ mwan_smtp2go_api_key }}
        owner: root
        group: root
        mode: "0640"
      no_log: true

    - name: Deploy mwan.env (production template)
      ansible.builtin.template:
        src: "{{ repo_root }}/mwan/config/mwan.env.j2"
        dest: /etc/mwan/mwan.env
        mode: "0644"

    - name: Deploy mwan-agent service
      ansible.builtin.copy:
        src: "{{ repo_root }}/mwan/go/cmd/mwan/mwan-agent.service"
        dest: /etc/systemd/system/mwan-agent.service
        mode: "0644"

    # --- systemd-networkd: interface naming and addressing ---

    - name: Deploy management interface networkd config (production template)
      ansible.builtin.template:
        src: "{{ repo_root }}/ansible/templates/vm/{{ item }}.j2"
        dest: "/etc/systemd/network/{{ item }}"
        mode: "0644"
      loop:
        - 10-mgmt.link
        - 10-mgmt.network

    - name: Deploy WAN link files (testbed, MAC-based matching)
      ansible.builtin.template:
        src: "{{ repo_root }}/mwan/networkd/testbed/{{ item }}.j2"
        dest: "/etc/systemd/network/{{ item }}"
        mode: "0644"
      loop:
        - 20-att.link
        - 20-att.network
        - 20-webpass.link
        - 20-webpass.network

    - name: Deploy monkeybrains networkd config (production template)
      ansible.builtin.template:
        src: "{{ repo_root }}/mwan/networkd/{{ item }}.j2"
        dest: "/etc/systemd/network/{{ item }}"
        mode: "0644"
      loop:
        - 30-monkeybrains.link
        - 30-monkeybrains.network

    - name: Deploy mwanbr networkd config (production template)
      ansible.builtin.template:
        src: "{{ repo_root }}/mwan/networkd/{{ item }}.j2"
        dest: "/etc/systemd/network/{{ item }}"
        mode: "0644"
      loop:
        - 40-mwanbr.link
        - 40-mwanbr.network

    - name: Reload udev rules
      ansible.builtin.command: udevadm control --reload
      changed_when: false
      failed_when: false

    - name: Trigger net udev events
      ansible.builtin.command: udevadm trigger --action=add --subsystem-match=net
      changed_when: false
      failed_when: false

    # --- System configs (production templates) ---

    - name: Deploy nftables (production template)
      ansible.builtin.template:
        src: "{{ repo_root }}/mwan/config/nftables.conf.j2"
        dest: /etc/nftables.conf
        mode: "0644"

    - name: Deploy sysctl (production template)
      ansible.builtin.template:
        src: "{{ repo_root }}/mwan/config/sysctl-mwan.conf.j2"
        dest: /etc/sysctl.d/99-mwan.conf
        mode: "0644"

    - name: Deploy routing tables (production template)
      ansible.builtin.template:
        src: "{{ repo_root }}/mwan/config/rt_tables.j2"
        dest: /etc/iproute2/rt_tables
        mode: "0644"

    # --- Scripts (same as production, not templated) ---

    - name: Deploy scripts
      ansible.builtin.copy:
        src: "{{ repo_root }}/mwan/scripts/{{ item }}"
        dest: "/usr/local/bin/{{ item }}"
        mode: "0755"
      loop:
        - update-routes.sh
        - update-npt.sh
        - mwan-update-npt-all.sh
        - mwan-wait-routes-prereqs.sh
        - mwan-wait-npt-prereqs.sh
        - find-pd-prefixes.sh

    - name: Deploy systemd services (same as production)
      ansible.builtin.copy:
        src: "{{ repo_root }}/mwan/services/{{ item }}"
        dest: "/etc/systemd/system/{{ item }}"
        mode: "0644"
      loop:
        - mwan-update-routes.service
        - mwan-update-npt.service

    - name: Deploy networkd-dispatcher hooks
      ansible.builtin.copy:
        src: "{{ repo_root }}/mwan/hooks/{{ item }}"
        dest: "/etc/networkd-dispatcher/routable.d/{{ item }}"
        mode: "0755"
      loop:
        - 50-update-routes.sh
        - 55-update-npt.sh

    - name: Enable services
      ansible.builtin.systemd:
        name: "{{ item }}"
        enabled: true
        daemon_reload: true
      loop:
        - nftables
        - systemd-networkd
        - networkd-dispatcher
        - mwan-update-routes
        - mwan-update-npt
        - mwan-agent

    - name: Apply sysctl
      ansible.builtin.command: sysctl --system
      changed_when: false

# --- LXC 100 (mwan-failover-test) ---
- name: Configure LXC 100
  hosts: mwan-failover-test
  become: false
  vars_files:
    - ../inventory/group_vars/mwan_testbed_servers.yml
  vars:
    repo_root: "{{ playbook_dir | dirname | dirname }}"
  tasks:
    - name: Create directories
      ansible.builtin.file:
        path: /etc/mwan
        state: directory
        mode: "0755"

    - name: Install nftables
      ansible.builtin.apt:
        name: nftables
        state: present

    - name: Deploy mwan binary
      ansible.builtin.copy:
        src: "{{ repo_root }}/mwan/go/bin/mwan-linux"
        dest: /usr/local/bin/mwan
        mode: "0755"

    - name: Deploy agent config
      ansible.builtin.template:
        src: "{{ repo_root }}/mwan-failover/config.toml.j2"
        dest: /etc/mwan/config.toml
        mode: "0644"

    # The failover LXC config.toml has an [email] block but no smtp2go_api_key.
    # The mwan binary reads SMTP2GO_API_KEY from this file via the systemd
    # EnvironmentFile= directive on each mwan unit.
    - name: Deploy MWAN secrets environment file (LXC 100)
      ansible.builtin.copy:
        dest: /etc/mwan/secrets.env
        content: |
          SMTP2GO_API_KEY={{ mwan_smtp2go_api_key }}
        owner: root
        group: root
        mode: "0640"
      no_log: true

    - name: Deploy nftables
      ansible.builtin.copy:
        src: "{{ repo_root }}/mwan-failover/nftables.conf"
        dest: /etc/nftables.conf
        mode: "0644"

    - name: Deploy failover sysctl config
      ansible.builtin.copy:
        src: "{{ repo_root }}/mwan-failover/sysctl.conf"
        dest: /etc/sysctl.d/99-mwan-failover.conf
        mode: "0644"

    - name: Deploy /etc/network/interfaces
      ansible.builtin.template:
        src: "{{ repo_root }}/mwan-failover/interfaces.j2"
        dest: /etc/network/interfaces
        mode: "0644"

    - name: Deploy mwan-agent service
      ansible.builtin.copy:
        src: "{{ repo_root }}/mwan/go/cmd/mwan/mwan-agent.service"
        dest: /etc/systemd/system/mwan-agent.service
        mode: "0644"

    - name: Deploy mwan-ifmgr service
      ansible.builtin.copy:
        src: "{{ repo_root }}/mwan-failover/mwan-ifmgr.service"
        dest: /etc/systemd/system/mwan-ifmgr.service
        mode: "0644"

    - name: Enable services
      ansible.builtin.systemd:
        name: "{{ item }}"
        enabled: true
        daemon_reload: true
      loop:
        - nftables
        - mwan-agent
        - mwan-ifmgr
