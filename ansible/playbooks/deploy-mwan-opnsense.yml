---
# Deploy mwan-opnsense to an OPNsense host (testbed first, then prod).
#
# Usage:
#   # testbed (suburban VM 101 via MWAN link IP):
#   ansible-playbook playbooks/deploy-mwan-opnsense.yml \
#     -e mwan_opnsense_target=testbed
#
#   # prod (vault VM 101 via fe::2):
#   ansible-playbook playbooks/deploy-mwan-opnsense.yml \
#     -e mwan_opnsense_target=prod
#
# The hypervisor-side virtio-serial-pci args change is one-time and
# manual (see plan: V0-S9). Re-run this playbook freely afterwards.

- name: Resolve OPNsense target into ansible inventory
  hosts: localhost
  gather_facts: false
  vars:
    mwan_opnsense_group_vars_files:
      testbed: "{{ playbook_dir }}/../inventory/group_vars/mwan_testbed_servers.yml"
      prod: "{{ playbook_dir }}/../inventory/group_vars/mwan_servers.yml"
  tasks:
    - name: Validate target
      ansible.builtin.assert:
        that:
          - mwan_opnsense_target is defined
          - mwan_opnsense_target == 'testbed'
        fail_msg: >-
          Only -e mwan_opnsense_target=testbed is allowed for this packaging
          verification playbook run.

    - name: Load target environment vars
      ansible.builtin.include_vars:
        file: "{{ mwan_opnsense_group_vars_files[mwan_opnsense_target] }}"

    - name: Validate target connection vars
      ansible.builtin.assert:
        that:
          - mwan_opnsense_ansible_host is defined
          - mwan_opnsense_ansible_user is defined
          - mwan_opnsense_ansible_ssh_common_args is defined

    - name: Add OPNsense host to inventory
      ansible.builtin.add_host:
        name: "opnsense_{{ mwan_opnsense_target }}"
        groups: mwan_opnsense_targets
        ansible_host: "{{ mwan_opnsense_ansible_host }}"
        ansible_user: "{{ mwan_opnsense_ansible_user }}"
        ansible_ssh_common_args: "{{ mwan_opnsense_ansible_ssh_common_args }}"

- name: Deploy mwan-opnsense daemon
  hosts: mwan_opnsense_targets
  gather_facts: false
  vars:
    mwan_opnsense_binary_local: "{{ playbook_dir }}/../../mwan/go/bin/mwan-opnsense"
  tasks:
    - name: Verify binary exists locally
      ansible.builtin.stat:
        path: "{{ mwan_opnsense_binary_local }}"
      register: bin_stat
      delegate_to: localhost

    - name: Fail if binary missing
      ansible.builtin.fail:
        msg: "build the binary first: cd mwan/go && make build-mwan-opnsense"
      when: not bin_stat.stat.exists

    - name: Run in-guest install task
      ansible.builtin.include_tasks: tasks/mwan-opnsense-deploy.yml
