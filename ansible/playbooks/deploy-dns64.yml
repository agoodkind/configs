---
# Deploy bind9 with DNS64 synthesis on dns64 LXCs in either environment.
# Container creation is owned by OpenTofu (opentofu/vault/ for prod,
# opentofu/suburban/ for the testbed). This playbook runs after the LXC
# is provisioned and reachable via SSH.
#
# Usage:
#   # Production (vault):
#   go run goodkind.io/configs/cmd/configs deploy deploy-dns64 --limit dns64_servers
#
#   # Suburban testbed:
#   go run goodkind.io/configs/cmd/configs deploy deploy-dns64 --limit dns64_suburban_servers
#
#   # Both at once:
#   go run goodkind.io/configs/cmd/configs deploy deploy-dns64 --limit dns64_all

- name: Prepare dns64 guest (SSH keys, package-updater, base config)
  ansible.builtin.import_playbook: prep-guests.yml
  vars:
    target_hosts: dns64_servers:dns64_suburban_servers

- name: Configure DNS64 Service
  hosts: dns64_servers:dns64_suburban_servers
  become: true
  environment:
    DEBIAN_FRONTEND: noninteractive
  tasks:
    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600

    - name: Install Bind9
      ansible.builtin.apt:
        name:
          - bind9
          - bind9-utils
          - bind9-dnsutils
        state: present

    - name: Configure named.conf.options for DNS64
      ansible.builtin.template:
        src: ../../bind/named.conf.options.j2
        dest: /etc/bind/named.conf.options
        owner: root
        group: bind
        mode: "0644"
      notify: Restart Bind9

    - name: Ensure Bind9 is enabled and started
      ansible.builtin.systemd:
        name: named
        state: started
        enabled: true

  handlers:
    - name: Restart Bind9
      ansible.builtin.systemd:
        name: named
        state: restarted
