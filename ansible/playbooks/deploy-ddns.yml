---
# ============================================================================
# Cloudflare Dynamic DNS deployment
# ============================================================================
# Installs Zebradil/cloudflare-dynamic-dns, renders per-instance configs,
# installs the cfddns-notify post-hook via a drop-in, and enables timers.
# Also removes the legacy ddclient setup.
#
# Usage:
#   bash -c "cd /Users/agoodkind/Sites/configs/ansible && ansible-playbook \
#     --vault-password-file ~/.config/ansible/vault.pass \
#     playbooks/deploy-ddns.yml"
# ============================================================================

- name: Add ddns hosts to inventory
  hosts: localhost
  gather_facts: false
  tasks:
    - name: Add suburban hypervisor
      ansible.builtin.add_host:
        name: suburban
        groups: ddns_servers
        ansible_host: "10.240.0.148"
        ansible_user: root
        ansible_ssh_common_args: "-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null"

- name: Deploy cloudflare-dynamic-dns
  hosts: ddns_servers
  become: true
  vars_files:
    - ../inventory/group_vars/all/vars.yml
    - ../inventory/group_vars/all/vault.yml
    - ../inventory/group_vars/ddns_servers.yml
  vars:
    repo_root: "{{ playbook_dir | dirname | dirname }}"
    scripts_repo: "{{ lookup('env', 'SCRIPTS_REPO') | default('/Users/agoodkind/Sites/scripts', true) }}"
    cfddns_version: "4.4.4"
    cfddns_arch_map:
      x86_64: amd64
      aarch64: arm64
      armv7l: armv7
    cfddns_deb_arch: "{{ cfddns_arch_map[ansible_architecture] | default('amd64') }}"
    cfddns_deb_url: >-
      https://github.com/Zebradil/cloudflare-dynamic-dns/releases/download/{{ cfddns_version }}/cloudflare-dynamic-dns_{{ cfddns_version }}_linux_{{ cfddns_deb_arch }}.deb
    cfddns_config_dir: /etc/cloudflare-dynamic-dns/config.d
    cfddns_unit_dropin_dir: /etc/systemd/system/cloudflare-dynamic-dns@.service.d
    cfddns_timer_dir: /etc/systemd/system

  tasks:
    - name: Check installed cloudflare-dynamic-dns version
      ansible.builtin.command: dpkg-query -W -f='${Version}' cloudflare-dynamic-dns
      register: cfddns_installed
      changed_when: false
      failed_when: false

    - name: Download cloudflare-dynamic-dns .deb
      ansible.builtin.get_url:
        url: "{{ cfddns_deb_url }}"
        dest: "/tmp/cloudflare-dynamic-dns_{{ cfddns_version }}.deb"
        mode: "0644"
      when: cfddns_installed.stdout != cfddns_version

    - name: Install cloudflare-dynamic-dns
      ansible.builtin.apt:
        deb: "/tmp/cloudflare-dynamic-dns_{{ cfddns_version }}.deb"
      when: cfddns_installed.stdout != cfddns_version

    - name: Ensure config directory exists
      ansible.builtin.file:
        path: "{{ cfddns_config_dir }}"
        state: directory
        owner: root
        group: root
        mode: "0750"

    - name: Ensure notify state directory exists
      ansible.builtin.file:
        path: /var/cache/cfddns-notify
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: Ensure /opt/scripts directory exists
      ansible.builtin.file:
        path: /opt/scripts
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: Install cfddns-notify script
      ansible.builtin.copy:
        src: "{{ scripts_repo }}/cfddns-notify"
        dest: /opt/scripts/cfddns-notify
        owner: root
        group: root
        mode: "0755"

    - name: Ensure send-email is installed
      ansible.builtin.copy:
        src: "{{ scripts_repo }}/send-email"
        dest: /opt/scripts/send-email
        owner: root
        group: root
        mode: "0755"

    - name: Render ddns instance configs
      ansible.builtin.template:
        src: >-
          {{ repo_root }}/ddns/config/{{
            'ipv4.yaml.j2' if item.value.stack == 'ipv4' else 'ipv6.yaml.j2'
          }}
        dest: "{{ cfddns_config_dir }}/{{ item.key }}.yaml"
        owner: root
        group: root
        mode: "0640"
      loop: "{{ ddns_instances | dict2items }}"
      loop_control:
        label: "{{ item.key }} ({{ item.value.stack }})"
      vars:
        ddns_cloudflare_token: "{{ item.value.token | default(cloudflare_api_token) }}"
        ddns_ipv4_domains: "{{ item.value.domains }}"
        ddns_ipv6_iface: "{{ item.value.iface | default('') }}"
        ddns_ipv6_domains: "{{ item.value.domains }}"
        ddns_ipv6_priority_subnets: "{{ item.value.priority_subnets | default([]) }}"
        ddns_ttl: "{{ item.value.ttl | default(1) }}"
      register: ddns_config_render

    - name: Ensure systemd drop-in directory exists
      ansible.builtin.file:
        path: "{{ cfddns_unit_dropin_dir }}"
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: Install notify drop-in
      ansible.builtin.copy:
        src: "{{ repo_root }}/ddns/services/notify.conf"
        dest: "{{ cfddns_unit_dropin_dir }}/notify.conf"
        owner: root
        group: root
        mode: "0644"
      register: ddns_dropin

    - name: Install timer template
      ansible.builtin.copy:
        src: "{{ repo_root }}/ddns/services/cloudflare-dynamic-dns@.timer"
        dest: "{{ cfddns_timer_dir }}/cloudflare-dynamic-dns@.timer"
        owner: root
        group: root
        mode: "0644"
      register: ddns_timer_unit

    - name: Reload systemd when units changed
      ansible.builtin.systemd:
        daemon_reload: true
      when: ddns_dropin.changed or ddns_timer_unit.changed

    - name: Enable and start ddns timers
      ansible.builtin.systemd:
        name: "cloudflare-dynamic-dns@{{ item.key }}.timer"
        enabled: true
        state: started
      loop: "{{ ddns_instances | dict2items }}"
      loop_control:
        label: "{{ item.key }}"

    - name: Force immediate run when configs changed
      ansible.builtin.systemd:
        name: "cloudflare-dynamic-dns@{{ item.item.key }}.service"
        state: restarted
      loop: "{{ ddns_config_render.results }}"
      loop_control:
        label: "{{ item.item.key }}"
      when: item.changed

    # --- Remove legacy ddclient ---
    - name: Stop and disable ddclient
      ansible.builtin.systemd:
        name: ddclient
        state: stopped
        enabled: false
      failed_when: false

    - name: Remove ddclient package
      ansible.builtin.apt:
        name: ddclient
        state: absent
        purge: true

    - name: Remove legacy ddclient files
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        - /etc/ddclient.conf
        - /etc/ddclient-notify
        - /opt/scripts/ddclient-notify
        - /var/cache/ddclient
