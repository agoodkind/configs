---
# Deploy the Tack Compose stack on any host in tack_servers or tack_qa_servers.
# Container creation is handled by OpenTofu (opentofu/vault/ for
# production; opentofu/suburban/ for QA). This playbook runs after the LXC
# is provisioned and reachable via SSH.
#
# Usage:
#   # Production
#   ansible-playbook playbooks/deploy-tack.yml -l tack_servers
#
#   # QA
#   ansible-playbook playbooks/deploy-tack.yml -l tack_qa_servers

- name: Prepare tack guest (SSH keys, package-updater, base config)
  ansible.builtin.import_playbook: prep-guests.yml
  vars:
    target_hosts: tack_servers:tack_qa_servers

- name: Provision Tack via Docker Compose
  hosts: tack_servers:tack_qa_servers
  become: true
  environment:
    DEBIAN_FRONTEND: noninteractive

  vars:
    repo_root: "{{ playbook_dir | dirname | dirname }}"

  tasks:
    # -------------------------------------------------------------------------
    # Docker CE install
    # -------------------------------------------------------------------------
    - name: Install prerequisites for Docker repo
      ansible.builtin.apt:
        name:
          - ca-certificates
          - curl
          - openssl
          - ndppd
        state: present
        update_cache: true

    - name: Add Docker apt repository (deb822 format)
      ansible.builtin.deb822_repository:
        name: docker
        types: deb
        uris: https://download.docker.com/linux/debian
        suites: trixie
        components: stable
        architectures: amd64
        signed_by: https://download.docker.com/linux/debian/gpg
        state: present

    - name: Install Docker CE
      ansible.builtin.apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-buildx-plugin
          - docker-compose-plugin
        state: present
        update_cache: true

    # -------------------------------------------------------------------------
    # Host-level networking: sysctl, ndppd, Docker daemon
    # -------------------------------------------------------------------------
    - name: Configure IPv6 forwarding and NDP proxy in sysctl
      ansible.builtin.copy:
        dest: /etc/sysctl.d/99-tack-ipv6.conf
        mode: "0644"
        content: |
          # Managed by Ansible (deploy-tack.yml)
          # Required for the IPv6-only Docker bridge and NDP proxy to work.
          net.ipv6.conf.all.forwarding = 1
          net.ipv6.conf.eth0.proxy_ndp = 1
      notify: Apply sysctl

    - name: Configure ndppd to proxy the Docker bridge subnet onto eth0
      ansible.builtin.copy:
        dest: /etc/ndppd.conf
        mode: "0644"
        content: |
          # Managed by Ansible (deploy-tack.yml)
          # Proxies the Docker bridge /96 onto eth0 so the upstream router
          # sees container GUAs as on-link. tack_ndp_proxy_prefix is set per
          # host in group_vars so prod and QA use separate subnets.
          route-ttl 30000
          proxy eth0 {
             router yes
             timeout 500
             ttl 30000
             rule {{ tack_ndp_proxy_prefix }} {
                auto
             }
          }
      notify: Restart ndppd

    - name: Enable and start ndppd
      ansible.builtin.systemd:
        name: ndppd
        enabled: true
        state: started

    - name: Configure Docker daemon for IPv6
      ansible.builtin.copy:
        dest: /etc/docker/daemon.json
        mode: "0644"
        content: |
          {
            "ipv6": true,
            "ip6tables": true
          }
      notify: Restart Docker

    - name: Enable and start Docker
      ansible.builtin.systemd:
        name: docker
        enabled: true
        state: started

    # -------------------------------------------------------------------------
    # Audit signing key (per-host; QA must not share production's key)
    # -------------------------------------------------------------------------
    - name: Create /etc/tack directory
      ansible.builtin.file:
        path: /etc/tack
        state: directory
        owner: root
        group: root
        mode: "0750"

    - name: Generate Ed25519 audit signing key if not present
      ansible.builtin.command:
        cmd: >
          openssl genpkey -algorithm ed25519
          -out {{ tack_audit_signing_key_path }}
        creates: "{{ tack_audit_signing_key_path }}"
      notify: Restrict audit signing key permissions

    - name: Ensure audit signing key has restricted permissions
      ansible.builtin.file:
        path: "{{ tack_audit_signing_key_path }}"
        owner: root
        group: root
        mode: "0600"

    # -------------------------------------------------------------------------
    # FDB cluster directory (fdb service mounts it read-write to write its
    # cluster file; app mounts it read-only to find the cluster)
    # -------------------------------------------------------------------------
    - name: Ensure /etc/foundationdb directory exists
      ansible.builtin.file:
        path: /etc/foundationdb
        state: directory
        owner: root
        group: root
        mode: "0755"

    # -------------------------------------------------------------------------
    # Tack install directory and files
    # -------------------------------------------------------------------------
    - name: Create Tack install directory
      ansible.builtin.file:
        path: "{{ tack_install_dir }}"
        state: directory
        owner: root
        group: root
        mode: "0750"

    - name: Create Tack fdb-overlay directory
      ansible.builtin.file:
        path: "{{ tack_install_dir }}/fdb-overlay"
        state: directory
        owner: root
        group: root
        mode: "0750"

    - name: Fetch fdb-overlay/fdb.bash from the tack repo SOT
      ansible.builtin.get_url:
        url: "https://api.github.com/repos/agoodkind/tack/contents/fdb-overlay/fdb.bash?ref={{ tack_commit }}"
        dest: "{{ tack_install_dir }}/fdb-overlay/fdb.bash"
        headers:
          Authorization: "Bearer {{ tack_repo_read_token }}"
          Accept: "application/vnd.github.raw"
        owner: root
        group: root
        mode: "0755"
        force: true
      no_log: true
      notify: Restart Tack

    - name: Create Tack yugabyte-overlay directory
      ansible.builtin.file:
        path: "{{ tack_install_dir }}/yugabyte-overlay"
        state: directory
        owner: root
        group: root
        mode: "0750"

    - name: Fetch yugabyte-overlay/yugabyted from the tack repo SOT (PR #23158 patch)
      ansible.builtin.get_url:
        url: "https://api.github.com/repos/agoodkind/tack/contents/yugabyte-overlay/yugabyted?ref={{ tack_commit }}"
        dest: "{{ tack_install_dir }}/yugabyte-overlay/yugabyted"
        headers:
          Authorization: "Bearer {{ tack_repo_read_token }}"
          Accept: "application/vnd.github.raw"
        owner: root
        group: root
        mode: "0755"
        force: true
      no_log: true
      notify: Restart Tack

    - name: Deploy Tack environment file
      ansible.builtin.template:
        src: "{{ repo_root }}/tack/tack.env.j2"
        dest: "{{ tack_install_dir }}/.env"
        owner: root
        group: root
        mode: "0600"
      notify: Restart Tack

    # The tack docker-compose.yml is the single source of truth and lives in the
    # tack repo. Ansible fetches it (and the overlays above) from the GitHub SOT
    # at the deployed ref; the rendered .env above is the env override. tack_commit
    # is the tack ref to deploy (a branch or a full SHA), passed as an extra var.
    - name: Fetch docker-compose.yml from the tack repo SOT
      ansible.builtin.get_url:
        url: "https://api.github.com/repos/agoodkind/tack/contents/docker-compose.yml?ref={{ tack_commit }}"
        dest: "{{ tack_install_dir }}/docker-compose.yml"
        headers:
          Authorization: "Bearer {{ tack_repo_read_token }}"
          Accept: "application/vnd.github.raw"
        owner: root
        group: root
        mode: "0644"
        force: true
      no_log: true
      notify: Restart Tack

    # -------------------------------------------------------------------------
    # GHCR auth and image pull
    # -------------------------------------------------------------------------
    - name: Authenticate Docker to ghcr.io
      ansible.builtin.command:
        cmd: docker login ghcr.io -u agoodkind --password-stdin
        stdin: "{{ ghcr_pull_token }}"
      changed_when: true
      no_log: true

    - name: Pull Tack images from ghcr.io
      ansible.builtin.command:
        cmd: docker compose pull
        chdir: "{{ tack_install_dir }}"
      changed_when: true

    # -------------------------------------------------------------------------
    # Compose stack up
    # -------------------------------------------------------------------------
    - name: Start Tack services (first pass; tolerant of an unconfigured fdb on first boot)
      ansible.builtin.command:
        cmd: docker compose up -d
        chdir: "{{ tack_install_dir }}"
      register: tack_compose_up_first
      changed_when: true
      failed_when: false

    - name: Provision (idempotent first boot; configure fresh fdb only where allowed, migrate, seed audit roles, seed product)
      ansible.builtin.command:
        cmd: "docker compose run --rm tack-ops ops provision{{ ' --allow-fdb-init' if tack_allow_fdb_init else '' }}"
        chdir: "{{ tack_install_dir }}"
      changed_when: true

    - name: Start Tack services (second pass; fdb configured, app and audit-consumer come up)
      ansible.builtin.command:
        cmd: docker compose up -d
        chdir: "{{ tack_install_dir }}"
      changed_when: true

  handlers:
    # Apply only this playbook's sysctl file, not `sysctl --system`. The tack
    # LXC is unprivileged, so host-namespaced kernel.* keys from the base image's
    # other /etc/sysctl.d files (kernel.core_pattern, kernel.sysrq,
    # kernel.core_uses_pid) are read-only inside the container and make
    # `sysctl --system` exit non-zero, failing the deploy on an unrelated key.
    # The net.ipv6 keys we set live in the container's own network namespace and
    # are writable, so `-p <our file>` applies them and exits 0. Keep unprivileged.
    - name: Apply sysctl
      ansible.builtin.command: sysctl -p /etc/sysctl.d/99-tack-ipv6.conf
      changed_when: true

    - name: Restart ndppd
      ansible.builtin.systemd:
        name: ndppd
        state: restarted

    - name: Restart Docker
      ansible.builtin.systemd:
        name: docker
        state: restarted

    - name: Restrict audit signing key permissions
      ansible.builtin.file:
        path: "{{ tack_audit_signing_key_path }}"
        owner: root
        group: root
        mode: "0600"

    - name: Restart Tack
      ansible.builtin.command:
        cmd: docker compose up -d --remove-orphans
        chdir: "{{ tack_install_dir }}"
      changed_when: true
