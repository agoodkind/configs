plugin: community.proxmox.proxmox
url: https://10.240.0.148:8006
user: ansible@pam
token_id: ansible-token
token_secret: "{{ (lookup('ansible.builtin.unvault', 'inventory/group_vars/all/vault.yml') | from_yaml).vault_suburban_testbed_pve_token_secret }}"
validate_certs: false
want_facts: true
# Include stopped guests too so playbooks can start them (e.g. prep-guests).
# Note: this Proxmox API is currently unreachable from this controller
# (https://10.240.0.148:8006 and IPv6 literal both fail). Inventory load
# warns and proceeds with no suburban guests until the network path is fixed.
compose:
  ansible_host: (proxmox_ipconfig0.ip | default(proxmox_net0.ip) | ansible.utils.ipaddr('address'))
  ansible_proxmox_host: proxmox_node
  ansible_proxmox_vmid: proxmox_vmid
  proxmox_vmtype: proxmox_type
keyed_groups:
  - key: proxmox_tags_parsed
    separator: ""
    prefix: tag
groups:
  proxmox: true
  proxmox_all_lxc: "proxmox_type == 'lxc'"
  proxmox_all_qemu: "proxmox_type == 'qemu'"
