---
# Single source of truth for service hostnames and IPv6 addresses
# All services use <service>.home.goodkind.io pattern (or alternate domain)
#
# Usage:
#   - group_vars: service_ipv6_address: "{{ service_mapping.<service>.ipv6 }}/64"
#   - templates: {{ service_mapping.<service>.hostname }}
#   - SSHPiper: iterates over service_mapping for routing

service_mapping:
  # LXC Containers
  debianct:
    hostname: debianct.home.goodkind.io
    ipv6: "3d06:bad:b01::100"
  unifi:
    hostname: unifi.home.goodkind.io
    ipv6: "3d06:bad:b01::102"
    ipv4: "10.250.0.102"
  dns64:
    hostname: dns64.home.goodkind.io
    ipv6: "3d06:bad:b01::64" # id: 103
  consul:
    hostname: consul.home.goodkind.io
    ipv6: "3d06:bad:b01::106"
  freebsd_dev_home:
    hostname: freebsd-dev.home.goodkind.io
    ipv6: "3d06:bad:b01::108"
  mc:
    hostname: mc.home.goodkind.io
    ipv6: "3d06:bad:b01::109"
  proxy:
    hostname: proxy.home.goodkind.io
    ipv6: "3d06:bad:b01::110"
    ipv4: "10.250.0.110"
  adguard:
    hostname: adguard.home.goodkind.io
    ipv6: "3d06:bad:b01::53" # id: 112
  mwan:
    hostname: mwan.home.goodkind.io
    ipv6: "3d06:bad:b01::113"
  mwan_failover:
    hostname: mwan-failover.home.goodkind.io
    # LXC BGP backup peer; eth1 on mwanbr (vault is on same bridge so
    # this address is the natural Ansible SSH target). eth0 lives on mbrains
    # for the upstream-ISP iface that mwan-ifmgr monitors.
    ipv6: "3d06:bad:b01:fe::4"
  tack:
    hostname: tack.home.goodkind.io
    ipv6: "3d06:bad:b01::117"
  tack_qa:
    hostname: tack-qa
    ipv6: "3d06:bad:b01:200:1::400"

  # Static Hosts (different subnet or external)
  mini:
    hostname: mini.home.goodkind.io
    ipv6: "3d06:bad:b01:1::2"
  nas:
    hostname: nas.home.goodkind.io
    ipv6: "3d06:bad:b01:1::3"

  # Testbed guests on suburban
  test_mwan:
    hostname: test-mwan
    ipv6: "3d06:bad:b01:200::950"
  mwan_failover_test:
    hostname: mwan-failover-test
    # eth1 static OPNsense-side address; eth0 is DHCP on vmbr6
    ipv6: "3d06:bad:b01:201::4"
  # OPNsense (one logical machine per environment). The plugin uses ipv6 as
  # ansible_host by default, which is correct for prod. Testbed sets
  # ansible_host to the WAN/internal address reachable on vmbr2.
  opnsense:
    hostname: router.home.goodkind.io
    ipv6: "3d06:bad:b01::1"
  opnsense_test:
    hostname: opnsense-test
    ipv6: "3d06:bad:b01:211::1"
    ipv4: "10.250.250.2"
    # Testbed OPNsense SSH lands on the WAN/internal address through suburban.
    # SSH user and ProxyJump live in group_vars/opnsense_test_servers.yml.
    ansible_host: "10.250.250.2"

# Parent groups composed of plugin-created child groups. The service_mapping
# plugin creates each parent group and attaches the listed children at parse
# time, so playbooks can target the parent (e.g. tack_all) and group_vars/
# tack_all.yml resolves for every member host.
group_children:
  tack_all:
    - tack_servers
    - tack_qa_servers
