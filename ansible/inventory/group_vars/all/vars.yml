---
# Shared non-secret variables only

# Proxmox API credentials (shared across all playbooks)
proxmox_api_host: 3d06:bad:b01::254
proxmox_api_user: ansible@pam
proxmox_token_id: ansible-token

# mwan-watchdog Proxmox API token (separate token on vault, root@pam!watchdog)
mwan_watchdog_pve_token_id: "root@pam!watchdog"

# ----------------------------------------------------------------------------
# SMTP (outbound) defaults for all CTs/VMs (via prep-guests)
# ----------------------------------------------------------------------------
smtp_enabled: "1"
smtp_from_domain: goodkind.io

# SMTP2GO per-host provisioning. prep-guests derives the SMTP user
# host-<hostname>, generates its password, provisions it through the SMTP2GO API
# with vault_smtp2go_api_key, and sets the From address to
# <hostname>@<smtp_from_domain>. Set smtp_enabled to "0" to skip.
smtp_host: mail.smtp2go.com
smtp_port: "587"

# ----------------------------------------------------------------------------
# Guest prep defaults (prep-guests), shared by every service
# ----------------------------------------------------------------------------
# SSH port every guest listens on; proxy overrides this to 2222 in its group_vars.
service_ssh_port: 22
# Console auto-login for LXC guests.
console_autologin_enabled: true
# Default target group for a bare prep-guests run; every deploy overrides this at import.
target_hosts: proxmox_all_lxc
# Interactive login directory inside each guest; a service overrides it per group_vars.
login_dir: /root

# ----------------------------------------------------------------------------
# Cloudflare DNS (automatic DNS record updates)
# ----------------------------------------------------------------------------
cloudflare_dns_update_enabled: true

# ----------------------------------------------------------------------------
# Consul service discovery
# ----------------------------------------------------------------------------
consul_server_address: "consul.home.goodkind.io"
consul_datacenter: home
consul_domain: int
consul_agent_enabled: true
consul_version: "1.20.1"
consul_data_dir: /var/lib/consul
# eth0 on every guest; the vault hypervisor overrides this to vmbr0 in the inventory.
consul_bind_interface: eth0

# ----------------------------------------------------------------------------
# cloudflared (Cloudflare Tunnel) systemd service defaults
# ----------------------------------------------------------------------------
# Empty service file means the generic unit; a service overrides it with its own.
cloudflared_service_src: ""
cloudflared_service_after: network-online.target
cloudflared_service_wants: network-online.target

# Static IP fallbacks (used when Consul is unavailable)
# Derived from service_mapping (single source of truth)
consul_static_ips: >-
  {{
    dict(
      service_mapping | dict2items
      | selectattr('value.ipv6', 'defined')
      | map(attribute='key')
      | zip(
          service_mapping | dict2items
          | selectattr('value.ipv6', 'defined')
          | map(attribute='value.ipv6')
        )
    )
  }}
