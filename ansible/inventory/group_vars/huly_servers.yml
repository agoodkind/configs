---
# Huly Project Management Container Configuration
# Note: Container provisioning (VMID, IP, MAC, resources, features) is managed
# by OpenTofu in opentofu/containers.tf. The vars below are kept for reference
# and for the Ansible configuration play (deploy-huly.yml).

# Service identity
service_hostname: "{{ service_mapping.huly.hostname }}"

# Static addressing (reference only - OpenTofu owns these)
service_ipv6_only: true
service_ipv6_address: "{{ service_mapping.huly.ipv6 }}/64"
service_mac_address: "bc:24:11:a3:52:17"

# Container resources (reference only - OpenTofu sets these)
service_memory: 8192
service_cores: 4
service_disk_size: 40
container_features: "nesting=1"

# Huly configuration
huly_install_dir: /opt/huly
huly_domain: "huly.home.goodkind.io"
huly_http_port: 8087
huly_update_notify_to: "alex@goodkind.io"
huly_http_bind: ""
huly_secure: ""
huly_title: "Huly Self Host"
huly_version: "v0.7.382"
huly_desktop_channel: "0.7.382"
huly_docker_name: huly_v7
huly_default_language: en
huly_last_name_first: "true"
huly_cr_database: defaultdb
huly_cr_username: selfhost
huly_redpanda_admin_user: superadmin

huly_volume_elastic_path: ""
huly_volume_files_path: ""
huly_volume_cr_data_path: ""
huly_volume_cr_certs_path: ""
huly_volume_redpanda_path: ""

# Auto-generated secrets via Ansible password lookup.
# Files are written to huly/.secrets/ (gitignored) on the Ansible controller
# and reused on subsequent runs so values stay stable.
huly_secret: >-
  {{ lookup('password', playbook_dir + '/../../huly/.secrets/huly_secret
  length=64 chars=ascii_letters,digits') }}
huly_cr_user_password: >-
  {{ lookup('password', playbook_dir + '/../../huly/.secrets/huly_cr_user_password
  length=40 chars=ascii_letters,digits') }}
huly_redpanda_admin_password: >-
  {{ lookup('password', playbook_dir + '/../../huly/.secrets/huly_redpanda_admin_password
  length=40 chars=ascii_letters,digits') }}
