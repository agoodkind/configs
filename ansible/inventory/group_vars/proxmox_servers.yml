---
# Shared defaults applied to all Proxmox hypervisors.
# Overridden per-host in vault_servers.yml and suburban_servers.yml.

# Feature flags that gate proxmox-host.yml task blocks. Explicit so the
# default(true) expressions in proxmox-host.yml never silently take effect
# without an inventory-level decision.
proxmox_mwan_host_role_enabled: true
mwan_ifmgr_enabled: true
mwan_watchdog_enabled: true

# Cloudflared OOB tunnel paths (non-secret). The enabled flag and per-host
# resolvers/credentials live in the per-hypervisor group_vars.
cloudflared_oob_enabled: false
cloudflared_oob_user: "cloudflared-oob"
cloudflared_oob_bin: "/usr/local/bin/cloudflared"
cloudflared_oob_config_dir: "/etc/cloudflared-oob"
