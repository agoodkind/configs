---
# Shared defaults applied to all Proxmox hypervisors.
# Overridden per-host in vault_servers.yml and suburban_servers.yml.

# Feature flags that gate proxmox-host.yml task blocks. Explicit so the
# task file fails loudly if inventory stops defining a required value.
proxmox_mwan_host_role_enabled: true
mwan_ifmgr_enabled: true
mwan_ifmgr_host_ipv6_policy_enabled: false
mwan_ifmgr_cloudflared_oob_user: ""
# Opt-in ifmgr modules under the unified `oob` role. Each absent flag
# leaves the matching [ifmgr.modules.X] section out of the rendered
# config; the module's Init then returns ifmgr.ErrModuleDisabled and
# the daemon drops it from its dispatch list.
mwan_ifmgr_cloudflared_tap_enabled: false
mwan_ifmgr_wg_enabled: false
mwan_watchdog_enabled: true
mwan_watchdog_service_name: "mwan-watchdog"
mwan_watchdog_unit_description: "MWAN Auto-Rollback Watchdog"
mwan_watchdog_wan_interfaces:
  - "enwebpass0"
  - "enmbrains0"

# Cloudflared OOB tunnel paths (non-secret). The enabled flag and per-host
# resolvers/credentials live in the per-hypervisor group_vars.
cloudflared_oob_enabled: false
cloudflared_oob_user: "cloudflared-oob"
cloudflared_oob_bin: "/usr/local/bin/cloudflared"
cloudflared_oob_config_dir: "/etc/cloudflared-oob"
