---
# Tack QA server configuration.
# Mirrors tack_servers.yml with QA-specific values. See qa-build-plan.md
# section 4 for the full rationale behind each override.

# Service identity
service_hostname: tack-qa
service_ipv6_only: true
service_ipv6_address: "{{ service_mapping.tack_qa.ipv6 }}/64"
service_mac_address: "bc:24:11:a3:53:17"

# Container resources (reference only; OpenTofu owns these)
service_memory: 8192
service_cores: 2
service_disk_size: 40
container_features: "nesting=1"

# Install directory. Matches production layout so make deploy and Ansible
# stay consistent across both environments.
tack_install_dir: /root/tack

tack_domain: "tack-qa"

# YugabyteDB credentials. QA uses a separate secret directory so values
# never overlap with production. The directory tack/.secrets-qa/ is
# gitignored on the Ansible controller.
tack_yugabyte_user: tack
tack_yugabyte_db: tack
tack_yugabyte_password: >-
  {{ lookup('password', playbook_dir + '/../../tack/.secrets-qa/yugabyte_password
  length=32 chars=ascii_letters,digits') }}

# Meilisearch master key (QA-specific).
tack_meili_master_key: >-
  {{ lookup('password', playbook_dir + '/../../tack/.secrets-qa/meili_master_key
  length=40 chars=ascii_letters,digits') }}

# Audit role passwords (QA-specific).
tack_audit_writer_password: >-
  {{ lookup('password', playbook_dir + '/../../tack/.secrets-qa/audit_writer_password
  length=32 chars=ascii_letters,digits') }}
tack_audit_reader_password: >-
  {{ lookup('password', playbook_dir + '/../../tack/.secrets-qa/audit_reader_password
  length=32 chars=ascii_letters,digits') }}
tack_audit_redactor_password: >-
  {{ lookup('password', playbook_dir + '/../../tack/.secrets-qa/audit_redactor_password
  length=32 chars=ascii_letters,digits') }}

# Audit signing key path on the host.
# QA generates its own key; sharing production's key would collapse the
# audit ledger compliance claim (qa-build-plan.md section 9.6).
tack_audit_signing_key_path: /etc/tack/audit-signing.pem

# tack-ops sidecar database URL (loopback, host networking, published port 5433).
tack_ops_database_url: >-
  postgres://{{ tack_yugabyte_user }}:{{ tack_yugabyte_password }}@[::1]:5433/{{ tack_yugabyte_db }}?sslmode=disable

# Docker IPv6 bridge subnet for QA. Carved from the suburban VM segment
# 3d06:bad:b01:200::/64, keeping the production-style :7ac: infix.
tack_docker_v6_subnet: "3d06:bad:b01:200:1:7ac::/96"
tack_docker_v6_gateway: "3d06:bad:b01:200:1:7ac::1"

# ndppd prefix to proxy on eth0. Must match tack_docker_v6_subnet.
tack_ndp_proxy_prefix: "3d06:bad:b01:200:1:7ac::/96"

# Log and runtime defaults.
tack_log_level: debug
tack_log_max_backups: 0
tack_log_max_age_days: 0
tack_log_max_size_mb: 100
tack_fdb_version: "7.4.6"
tack_port: 8000
