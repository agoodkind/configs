---
service_ipv6_only: true

# Container resources are reference values only; OpenTofu owns the live shape.
service_memory: 8192
service_cores: 2
service_disk_size: 40
container_features: "nesting=1"

tack_install_dir: /root/tack

# Matches the live database role. Hardening to a non-superuser tack_app role
# is tracked in TACK-180.
tack_yugabyte_user: yugabyte
tack_yugabyte_db: tack

# Each environment generates its own key at this path on first deploy. The
# path is shared; the key material is not.
tack_audit_signing_key_path: /etc/tack/audit-signing.pem

tack_ops_database_url: >-
  postgres://{{ tack_yugabyte_user }}:{{ tack_yugabyte_password }}@[::1]:5433/{{ tack_yugabyte_db }}?sslmode=disable

tack_log_level: debug
tack_log_max_backups: 0
tack_log_max_age_days: 0
tack_log_max_size_mb: 100
tack_fdb_version: "7.4.6"
tack_port: 8000

# Container image tag. Production uses latest; QA overrides with a branch SHA
# passed at deploy time.
tack_image_tag: latest
