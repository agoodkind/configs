---
# Plane Project Management Container Configuration
# Note: Container provisioning (VMID, IP, MAC, resources, features) is managed
# by OpenTofu in opentofu/containers.tf. The vars below are kept for reference
# and for the Ansible configuration play (deploy-plane.yml).

# Service identity
service_hostname: "{{ service_mapping.plane.hostname }}"

# Static addressing (reference only - OpenTofu owns these)
service_ipv6_only: true
service_ipv6_address: "{{ service_mapping.plane.ipv6 }}/64"
service_mac_address: "bc:24:11:a3:52:01"

# Container resources (reference only - OpenTofu owns these)
service_memory: 4096
service_cores: 2
service_disk_size: 25

# Container features (reference only - OpenTofu sets nesting=1 for Docker)
container_features: "nesting=1"

# Plane configuration
plane_install_dir: /opt/plane
plane_domain: "plane.goodkind.io"

# Auto-generated secrets via Ansible password lookup.
# Files are written to plane/.secrets/ (gitignored) on the Ansible controller
# and reused on every subsequent run so values stay stable.
plane_secret_key: >-
  {{ lookup('password', playbook_dir + '/../../plane/.secrets/secret_key
  length=50 chars=ascii_letters,digits') }}
plane_db_password: >-
  {{ lookup('password', playbook_dir + '/../../plane/.secrets/db_password
  length=32 chars=ascii_letters,digits') }}
plane_minio_secret_key: >-
  {{ lookup('password', playbook_dir + '/../../plane/.secrets/minio_key
  length=32 chars=ascii_letters,digits') }}
plane_rabbitmq_password: >-
  {{ lookup('password', playbook_dir + '/../../plane/.secrets/rabbitmq_password
  length=32 chars=ascii_letters,digits') }}
plane_live_secret_key: >-
  {{ lookup('password', playbook_dir + '/../../plane/.secrets/live_secret_key
  length=50 chars=ascii_letters,digits') }}
