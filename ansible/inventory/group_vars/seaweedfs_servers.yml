---
# Production SeaweedFS object-store LXC (CT 118 on vault).
# Lives on the prod VMNET segment (3d06:bad:b01::/64) beside the prod tack LXC,
# so the prod tack host reaches its S3 endpoint without crossing segments. Runs
# the weed binary under systemd. Internal only; never exposed off the segment.
# Shared keys live in seaweedfs_all.yml.

service_hostname: "{{ service_mapping.seaweedfs.hostname }}"
service_ipv6_address: "{{ service_mapping.seaweedfs.ipv6 }}/64"
service_mac_address: "BC:24:11:00:01:18"

# Bind on the LXC's own IPv6 address. The S3 endpoint is internal only.
seaweedfs_bind_address: "{{ service_mapping.seaweedfs.ipv6 }}"
