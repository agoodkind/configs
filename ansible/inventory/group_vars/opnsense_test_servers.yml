---
# Testbed OPNsense (VM 101 on suburban) target vars.
# Consumed by deploy-opnsense.yml when targeting `opnsense_test_servers`.
# Static `[opnsense_test_servers]` group in hosts owns the SSH identity.
# SSH targets the WAN/internal address on vmbr2.

ansible_user: root
ansible_ssh_common_args: >-
  -A -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null
  -o ProxyJump=root@[3d06:bad:b01:200::1]

# OPNsense identity for MWAN-side config rendering. Use IPv6 LAN address
# so testbed templates exercise the same URL-parsing path as production.
opnsense_addr: "3d06:bad:b01:211::1"
opnsense_gateway_names:
  - WAN_GW4
  - WAN_GW6

# OPNsense BGP (from OPNsense's perspective).
opnsense_bgp_router_id: "10.250.250.2"
opnsense_bgp_firewall_source_v4: "10.250.250.0/29"
opnsense_bgp_firewall_source_v6: "3d06:bad:b01:201::/64"
opnsense_bgp_neighbors:
  - address: "10.250.250.3"
    description: "VM950-IPv4"
    preference: "primary"
  - address: "3d06:bad:b01:201::3"
    description: "VM950-IPv6"
    preference: "primary"
  - address: "10.250.250.4"
    description: "LXC100-IPv4"
    preference: "backup"
  - address: "3d06:bad:b01:201::4"
    description: "LXC100-IPv6"
    preference: "backup"
