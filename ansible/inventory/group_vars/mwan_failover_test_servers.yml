---
# Testbed MWAN failover LXC (lxc-100 on suburban) target vars.
# Consumed by deploy-mwan-failover.yml when targeting `mwan_failover_test_servers`.

mwan_failover_hostname: "mwan-failover-test"
mwan_failover_email_from: "mwan-testbed@goodkind.io"
mwan_failover_subject_prefix: "[MWAN-suburban-failover]"

mwan_failover_bgp_asn: 4200000001
mwan_failover_bgp_router_id: "10.250.250.4"
mwan_failover_bgp_next_hop_v6: "3d06:bad:b01:201::4"
mwan_failover_bgp_neighbors:
  - "10.250.250.2"
mwan_failover_bgp_neighbors_v6:
  - "3d06:bad:b01:201::2"
mwan_failover_ipv4_address: "10.250.250.4/29"
mwan_failover_ipv6_address: "3d06:bad:b01:201::4/64"
mwan_failover_ipv4_return_route: ""
mwan_failover_ipv6_return_route: >-
  3d06:bad:b01:211::/64 via 3d06:bad:b01:201::2 dev eth1
mwan_failover_eth0_inet6_manual: true
mwan_failover_enable_mainv4: true
# Source interface for outbound failover alert email (empty = default route).
mwan_failover_email_bind_iface: ""
mwan_failover_install_nftables: true

# Shared BGP tunables. The failover config template reads the bare bgp_*
# names, so they are declared here to mirror the primary values.
# TODO(MWAN-229 follow-up): promote these to group_vars/all so every group
# inherits one definition instead of duplicating.
bgp_keepalive_seconds: 3
bgp_hold_seconds: 9
bgp_listen_port: 179
bgp_announce_ipv4:
  - "0.0.0.0/0"
bgp_announce_ipv6:
  - "::/0"

# BGP graceful restart (RFC 4724). Mirrors the primary so a failover agent
# restart holds routes in the helper instead of flapping the session.
mwan_bgp_graceful_restart_enabled: true
mwan_bgp_graceful_restart_time_seconds: 30
mwan_bgp_graceful_restart_notification_enabled: true

# Alert email routing. Recipient/level/cooldown mirror the other mwan groups;
# the failover keeps its own from-address and subject prefix above.
mwan_email_recipient: "alex@goodkind.io"
mwan_email_min_level: "ERROR"
mwan_email_cooldown: "5m"
