---
# Testbed MWAN failover LXC (lxc-100 on suburban) target vars.
# Consumed by deploy-mwan-failover.yml when targeting `mwan_failover_test_servers`.

mwan_failover_hostname: "mwan-failover-test"
mwan_failover_email_from: "mwan-testbed@goodkind.io"
mwan_failover_subject_prefix: "[MWAN-suburban-failover]"

mwan_failover_bgp_asn: 4200000001
mwan_failover_bgp_router_id: "10.250.250.4"
mwan_failover_bgp_next_hop_v6: "3d06:bad:b01:201::4"
mwan_failover_bgp_neighbors:
  - "10.250.250.2"
mwan_failover_bgp_neighbors_v6:
  - "3d06:bad:b01:201::2"
mwan_failover_ipv4_address: "10.250.250.4/29"
mwan_failover_ipv6_address: "3d06:bad:b01:201::4/64"
mwan_failover_ipv4_return_route: ""
mwan_failover_ipv6_return_route: >-
  3d06:bad:b01:211::/64 via 3d06:bad:b01:201::2 dev eth1
mwan_failover_eth0_inet6_manual: true
mwan_failover_enable_mainv4: true
# Source interface for outbound failover alert email (empty = default route).
mwan_failover_email_bind_iface: ""
mwan_failover_install_nftables: true
