---
# Testbed MWAN VM (VM 950 on suburban) target vars.
# Consumed by deploy-mwan.yml when targeting `test_mwan_servers`.
# Uses the same variable names as mwan_servers.yml so config.toml.j2
# and other shared templates render correctly for both environments.

# ----------------------------------------------------------------------------
# Identity
# ----------------------------------------------------------------------------

mwan_environment: "testbed"
mwan_vmid: 950
mwan_proxmox_node: hypervisor
mwan_proxmox_delegate: suburban

# Identity. service_mapping.test_mwan carries only the bare label (test-mwan),
# so set the canonical FQDN here directly to match prod's FQDN-form hostname.
# prep-guests sets the guest hostname to the first label.
service_hostname: "test-mwan.home.goodkind.io"

# VM 950 management is on the vmbrtrunk 204:: services LAN, off-segment from the
# controller (which reaches the testbed over a WARP tunnel). Like prod mwan,
# whose mgmt is reached on-link via the OPNsense-routed LAN, VM 950 has no mgmt
# policy route and its main default route is a WAN, so off-segment replies do not
# return. Reach it on-link through the suburban hypervisor, which sits on the
# same 204:: segment (204::5 on vmbrtrunk), mirroring the opnsense_test pattern.
ansible_ssh_common_args: >-
  -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null
  -o ProxyJump=root@[3d06:bad:b01:200::1]

mwan_dns_domain: "home.goodkind.io"
# VM 950 management is on the vmbrtrunk 204:: services LAN, so it resolves
# against the testbed OPNsense Unbound on that segment (MANAGEMENT iface 204::1),
# the prod-parity analog of prod mwan using the OPNsense LAN resolver ::1.
mwan_dns_servers: "3d06:bad:b01:204::1"

# ----------------------------------------------------------------------------
# Interfaces (testbed uses virtio, simpler than production passthrough)
# ----------------------------------------------------------------------------

mwan_mgmt_iface: "enmgmt0"
mwan_att_iface: "enatt0"
mwan_webpass_iface: "enwebpass0"
mwan_internal_iface: "enmwanbr0"
mwan_monkeybrains_iface: "enmbrains0"

# systemd-networkd files deployed to VM 950. Testbed AT&T/webpass are direct
# links (no VLAN, no 802.1X) from mwan/networkd/testbed/; monkeybrains and the
# internal mwanbr link reuse the shared prod templates (no prod-only vars).
mwan_networkd_files:
  - testbed/20-att.link
  - testbed/20-att.network
  - testbed/20-webpass.link
  - testbed/20-webpass.network
  - 30-monkeybrains.link
  - 30-monkeybrains.network
  - 40-mwanbr.link
  - 40-mwanbr.network

# MAC addresses (from PVE config, used by .link files for stable naming)
mwan_mgmt_mac: "BC:24:11:B3:9E:46"
mwan_att_mac: "BC:24:11:C0:D7:60"
mwan_webpass_mac: "BC:24:11:BE:8E:B4"
mwan_mbrains_mac: "BC:24:11:3D:CE:CC"
mwan_net1_mac: "BC:24:11:49:5D:94"

# AT&T on the testbed is a simulated ISP LXC on a direct link: no 802.1X, no
# ONT, no VLAN. The prod wpa_supplicant/ONT/VLAN-bringup tasks are skipped.
mwan_att_8021x_enabled: false
mwan_att_vlan_id: ""

# systemd units enabled at the end of the deploy. No AT&T 802.1X units on the
# testbed (wpa_supplicant-mwan, wpa-cli-action, wpa-authenticated.path,
# bringup-att-vlan are prod-only).
mwan_enabled_services:
  - mwan-trace-boot
  - mwan-update-npt
  - mwan-update-att-pinned-dests.timer
  - systemd-networkd
  - networkd-dispatcher
  - nftables
  - mwan-health

# ----------------------------------------------------------------------------
# WAN addressing (static, ISP LXCs have no DHCPv4 server)
# ----------------------------------------------------------------------------

mwan_webpass_ipv4: "10.240.204.2/24"
mwan_webpass_ipv4_addr: "10.240.204.2"
mwan_webpass_gateway: "10.240.204.1"
mwan_att_ipv4: "10.240.205.2/24"
mwan_att_ipv4_addr: "10.240.205.2"
mwan_att_gateway: "10.240.205.1"
mwan_monkeybrains_ipv4: "10.240.206.2/24"
mwan_monkeybrains_gateway: "10.240.206.1"

# DHCPv6 DUIDs (not needed for testbed, ISP LXCs don't check)
mwan_webpass_duid_raw_data: ""
mwan_monkeybrains_duid_raw_data: ""

# 1:1 NAT of services to each WAN's routed static block, mirroring prod (att
# 104.57.226.192/29, webpass 136.25.91.240/29). Each sim routes its /29 to VM 950;
# five services (10.250.250.2-6) map 1:1 to .2-.6 of each block.
mwan_static_mappings:
  att:
    - { internal: "10.250.250.2", external: "10.241.205.2" }
    - { internal: "10.250.250.3", external: "10.241.205.3" }
    - { internal: "10.250.250.4", external: "10.241.205.4" }
    - { internal: "10.250.250.5", external: "10.241.205.5" }
    - { internal: "10.250.250.6", external: "10.241.205.6" }
  webpass:
    - { internal: "10.250.250.2", external: "10.241.204.2" }
    - { internal: "10.250.250.3", external: "10.241.204.3" }
    - { internal: "10.250.250.4", external: "10.241.204.4" }
    - { internal: "10.250.250.5", external: "10.241.204.5" }
    - { internal: "10.250.250.6", external: "10.241.204.6" }

# ----------------------------------------------------------------------------
# Internal link (to OPNsense)
# ----------------------------------------------------------------------------

mwan_internal_ipv4: "10.250.250.3/29"
mwan_internal_ipv6: "3d06:bad:b01:201::3/64"
mwan_internal_net_v4: "10.250.250.0/29"
mwan_mwanbr_edge_ipv6: "3d06:bad:b01:201::3"
mwan_internal_prefix: "3d06:bad:b01:210::/60"

# OPNsense addresses (testbed OPNsense VM 101).
mwan_opnsense_ansible_host: "10.250.250.2"
mwan_opnsense_ansible_ssh_common_args: >-
  -A -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null
  -o ProxyJump=root@[3d06:bad:b01:200::1]
mwan_opnsense_ansible_user: root
mwan_opnsense_wan_ll: "fe80::be24:11ff:feec:efcc"
mwan_opnsense_edge_ipv6: "3d06:bad:b01:201::2"
# OPNsense API URL target for the agent (config-vm.toml.j2). Prod uses the
# OPNsense address on the mwan-mgmt segment (::1); the testbed analog reachable
# on-link from VM 950's 204:: management interface is the OPNsense MANAGEMENT
# address 204::1.
opnsense_addr: "3d06:bad:b01:204::1"
# OPNsense BGP integration the agent renders into config.toml (config-vm.toml.j2
# [opnsense.bgp]). Testbed values mirror suburban_servers.yml's OPNsense view:
# VM 950 (.3) is the primary BGP peer and LXC 100 (.4) the backup, over the
# 201:: internal link.
opnsense_gateway_names:
  - WAN_GW4
  - WAN_GW6
opnsense_bgp_router_id: "10.250.250.2"
opnsense_bgp_firewall_source_v4: "10.250.250.0/29"
opnsense_bgp_firewall_source_v6: "3d06:bad:b01:201::/64"
opnsense_bgp_neighbors:
  - address: "10.250.250.3"
    description: "VM950-IPv4"
    preference: "primary"
  - address: "3d06:bad:b01:201::3"
    description: "VM950-IPv6"
    preference: "primary"
  - address: "10.250.250.4"
    description: "LXC100-IPv4"
    preference: "backup"
  - address: "3d06:bad:b01:201::4"
    description: "LXC100-IPv6"
    preference: "backup"
failover_lxc_id: "100"

# ----------------------------------------------------------------------------
# IPv6 prefixes (simulated ISPs on suburban)
# ----------------------------------------------------------------------------

# NPT targets are the first /60 of each WAN's DHCPv6-PD delegation, mirroring prod.
# PD sizes match prod: webpass /56, att /60, monkeybrains /56. Sim delegation
# prefixes (the 22/23/24 /56-clean scheme) live in suburban_servers.yml
# testbed_isp_lxcs.
mwan_npt_att_prefix: "3d06:bad:b01:2300::/60"
mwan_npt_webpass_prefix: "3d06:bad:b01:2200::/60"
mwan_npt_monkeybrains_prefix: "3d06:bad:b01:2400::/60"

mwan_att_pd_prefix: "3d06:bad:b01:2300::/60"
mwan_webpass_pd_prefix: "3d06:bad:b01:2200::/56"
mwan_monkeybrains_pd_prefix: "3d06:bad:b01:2400::/56"

# ----------------------------------------------------------------------------
# Routing tables
# ----------------------------------------------------------------------------

mwan_rt_tables:
  att: 100
  webpass: 200
  monkeybrains: 300
  cloudflared: 400

# ----------------------------------------------------------------------------
# Interface manager WAN route module
# ----------------------------------------------------------------------------

# Testbed cutover validation: @wan runs in SHADOW on the 3-WAN prod-mirror. It
# computes and logs intended routes/rules but mutates nothing; the shell
# update-routes.sh stays authoritative, exactly as on prod. This is the first
# cutover step, validated here against the prod-mirror-pre-cutover snapshot
# before any prod cutover. Advance to dual-write (shadow_mode: false) only after
# the shadow intended-ops are confirmed to match the shell across all three WANs.
mwan_ifmgr_wan_enabled: true
mwan_ifmgr_wan_shadow_mode: true
mwan_ifmgr_wan_health_state_file: "/var/run/mwan-health.state"
mwan_ifmgr_wan_fw_marks:
  att: 1
  webpass: 2
  monkeybrains: 3
mwan_ifmgr_wan_fw_mark_prios:
  att: 100
  webpass: 200
  monkeybrains: 300
mwan_ifmgr_wan_from_prios:
  att: 55
  webpass: 56
  monkeybrains: 57

# ----------------------------------------------------------------------------
# Notifications
# ----------------------------------------------------------------------------

mwan_email_enabled: true
mwan_email_recipient: "alex@goodkind.io"
mwan_email_from: "mwan-testbed@goodkind.io"
mwan_email_script: "/opt/scripts/send-email"

# health-check.sh: how often to recheck systemd unit health (seconds)
mwan_systemd_check_interval: 600
mwan_email_sender_name: "MWAN-TESTBED"
mwan_debug_logging: true

# Variables consumed by mwan/config/config.toml.j2 [email] block.
mwan_email_min_level: "ERROR"
mwan_email_subject_prefix: "[MWAN-suburban]"
mwan_email_bind_iface: ""
mwan_email_cooldown: "5m"

# Health checks (same structure as production)
mwan_health_checks:
  att:
    enabled: true
    ping_count: 3
    success_threshold: 2
    check_interval: 10
    failure_threshold: 2
    recovery_threshold: 2
    targets_v4: ["1.1.1.1", "8.8.8.8"]
    targets_v6: ["2606:4700:4700::1111", "2001:4860:4860::8888"]
    http_targets: ["https://ifconfig.co/ip"]
  webpass:
    enabled: true
    ping_count: 3
    success_threshold: 2
    check_interval: 10
    failure_threshold: 2
    recovery_threshold: 2
    targets_v4: ["1.1.1.1", "8.8.8.8"]
    targets_v6: ["2606:4700:4700::1111", "2001:4860:4860::8888"]
    http_targets: ["https://ifconfig.co/ip"]
  monkeybrains:
    enabled: true
    ping_count: 5
    success_threshold: 1
    check_interval: 30
    failure_threshold: 5
    recovery_threshold: 3
    targets_v4: ["1.1.1.1", "8.8.8.8"]
    targets_v6: ["2606:4700:4700::1111", "2001:4860:4860::8888"]
    http_targets: ["https://ifconfig.co/ip"]

# AT&T pinning lists not used in testbed
mwan_att_pinned_v4_seed_cidrs: []
mwan_att_pinned_v4_fqdns: []
mwan_att_pinned_v6_seed_cidrs: []
mwan_att_pinned_v6_fqdns: []
mwan_zoom_ipranges_url: ""
mwan_health_exclude_wans: ["monkeybrains"]

# ----------------------------------------------------------------------------
# BGP (embedded GoBGP in agent)
# ----------------------------------------------------------------------------

bgp_asn: 4200000001
bgp_router_id: "10.250.250.3"
bgp_next_hop_v6: "3d06:bad:b01:201::3"
bgp_keepalive_seconds: 3
bgp_hold_seconds: 9
bgp_listen_port: 179
bgp_neighbors:
  - "10.250.250.2"
bgp_neighbors_v6:
  - "3d06:bad:b01:201::2"
bgp_announce_ipv4:
  - "0.0.0.0/0"
bgp_announce_ipv6:
  - "::/0"

# BGP Graceful Restart (RFC 4724). Mirrors mwan_servers.yml.
mwan_bgp_graceful_restart_enabled: true
mwan_bgp_graceful_restart_time_seconds: 30
mwan_bgp_graceful_restart_notification_enabled: true

# Shared runtime config values consumed by mwan/config/config.toml.j2.
mwan_config_hostname: "suburban-testbed"
mwan_config_mgmt_addr: "3d06:bad:b01:204::950"
mwan_watchdog_service_name: "mwan-watchdog-testbed"
mwan_watchdog_agent_tcp_addr: "[3d06:bad:b01:204::950]:50052"
mwan_watchdog_log_file: "/var/log/mwan-watchdog-testbed.log"
mwan_watchdog_json_log_file: "/var/log/mwan-watchdog-testbed.jsonl"
mwan_watchdog_state_file: "/run/mwan-rollback-testbed.state"
mwan_watchdog_lock_file: "/run/mwan-watchdog-testbed-rollback.lock"
mwan_ifmgr_role: "oob"
mwan_ifmgr_iface_key: "enmbrains0"
mwan_ifmgr_iface_name: "enmbrains0"
mwan_ifmgr_oob_addr: "3d06:bad:b01:2ff::1/128"
mwan_ifmgr_policy_from_v6: "3d06:bad:b01:2ff::1"
mwan_ifmgr_host_ipv6_policy_enabled: false

# Interface-manager cloudflared-tap module (off; downgrade automation).
mwan_ifmgr_cloudflared_tap_enabled: false
mwan_ifmgr_cloudflared_tap_unit: "cloudflared-oob"
mwan_ifmgr_cloudflared_tap_downgrade_patterns: []

# Interface-manager WireGuard health module (off).
mwan_ifmgr_wg_enabled: false
mwan_ifmgr_wg_ssh_host: ""
mwan_ifmgr_wg_identity_file: ""
mwan_ifmgr_wg_iface: "wg0"
mwan_ifmgr_wg_sudo: false
mwan_ifmgr_wg_warn_handshake_age: "180s"
mwan_ifmgr_wg_error_handshake_age: "300s"
mwan_ifmgr_wg_timeout: "10s"
mwan_ifmgr_wg_ignore_peers: []

# ----------------------------------------------------------------------------
# SMTP defaults (shared non-secret settings)
# ----------------------------------------------------------------------------

mwan_smtp_host: "{{ smtp_host }}"
mwan_smtp_port: "{{ smtp_port }}"
