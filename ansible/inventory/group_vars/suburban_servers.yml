---
# Suburban hypervisor (Proxmox host) target vars.
# Consumed by deploy-proxmox.yml when targeting `suburban` in `suburban_servers`.
# Also consumed by deploy-testbed.yml for the suburban-only ISP LXC and
# host-bridge work that has no production equivalent.
# Shared defaults live in proxmox_servers.yml.

# Consul agent settings
consul_bind_interface: enmgmt0

# Proxmox HTTP API host for `community.proxmox.proxmox_*` modules when
# operating against suburban.
proxmox_api_host: "3d06:bad:b01:200::1"

# MWAN host-side identity. Used by config.toml.j2 to populate the
# /etc/mwan/config.toml that suburban's `mwan ifmgr` and `mwan watchdog`
# services read.
mwan_config_hostname: "suburban-testbed"
mwan_config_mgmt_addr: "3d06:bad:b01:204::950"

# Shared testbed MWAN topology values consumed by the suburban host config.
mwan_environment: "testbed"
mwan_vmid: 950
mwan_proxmox_node: "hypervisor"
mwan_internal_iface: "enmwanbr0"
mwan_email_recipient: "alex@goodkind.io"
mwan_email_from: "mwan-testbed@goodkind.io"
mwan_email_min_level: "ERROR"
mwan_email_subject_prefix: "[MWAN-suburban]"
mwan_email_bind_iface: ""
mwan_email_cooldown: "5m"
opnsense_addr: "3d06:bad:b01:211::1"
opnsense_gateway_names:
  - WAN_GW4
  - WAN_GW6
opnsense_bgp_router_id: "10.250.250.2"
opnsense_bgp_firewall_source_v4: "10.250.250.0/29"
opnsense_bgp_firewall_source_v6: "3d06:bad:b01:201::/64"
opnsense_bgp_neighbors:
  - address: "10.250.250.3"
    description: "VM950-IPv4"
    preference: "primary"
  - address: "3d06:bad:b01:201::3"
    description: "VM950-IPv6"
    preference: "primary"
  - address: "10.250.250.4"
    description: "LXC100-IPv4"
    preference: "backup"
  - address: "3d06:bad:b01:201::4"
    description: "LXC100-IPv6"
    preference: "backup"
bgp_asn: 4200000001
bgp_router_id: "10.250.250.3"
bgp_next_hop_v6: "3d06:bad:b01:201::3"
bgp_keepalive_seconds: 3
bgp_hold_seconds: 9
bgp_listen_port: 179
bgp_neighbors:
  - "10.250.250.2"
bgp_neighbors_v6:
  - "3d06:bad:b01:201::2"
bgp_announce_ipv4:
  - "0.0.0.0/0"
bgp_announce_ipv6:
  - "::/0"
mwan_bgp_graceful_restart_enabled: true
mwan_bgp_graceful_restart_time_seconds: 30
mwan_bgp_graceful_restart_notification_enabled: true

# mwan-watchdog service on the host
mwan_watchdog_agent_tcp_addr: "[3d06:bad:b01:204::950]:50052"
mwan_watchdog_log_file: "/var/log/mwan-watchdog-testbed.log"
mwan_watchdog_json_log_file: "/var/log/mwan-watchdog-testbed.jsonl"
mwan_watchdog_state_file: "/run/mwan-rollback-testbed.state"
mwan_watchdog_lock_file: "/run/mwan-watchdog-testbed-rollback.lock"
mwan_watchdog_pve_token_id: "root@pam!watchdog-test2"
mwan_watchdog_service_name: "mwan-watchdog-testbed"
mwan_watchdog_unit_description: "MWAN Testbed Watchdog"
mwan_watchdog_wan_interfaces:
  - "enwebpass0"
  - "enmbrains0"

# mwan-opnsense host bridge service on suburban.
mwan_opnsense_host_upstream: "unix:///var/run/qemu-server/101.mwanrpc"
mwan_opnsense_host_listen_path: /var/run/mwan-opnsense.sock
mwan_opnsense_host_reconnect: "2s"
mwan_opnsense_host_hb_interval: "30s"
mwan_opnsense_host_hb_timeout: "10s"
mwan_opnsense_host_binary_local: "{{ repo_root }}/mwan/go/bin/mwan-linux"

# mwan-ifmgr service on the host
mwan_ifmgr_role: "oob"
mwan_ifmgr_iface_key: "enmbrains0"
mwan_ifmgr_iface_name: "enmbrains0"
mwan_ifmgr_oob_addr: "3d06:bad:b01:2ff::1/128"
mwan_ifmgr_policy_from_v6: "3d06:bad:b01:2ff::1"
mwan_ifmgr_host_ipv6_policy_enabled: true
mwan_ifmgr_host_ipv6_missing_iface_grace_period: "2m"
mwan_ifmgr_host_ipv6_allowed_ra_uplink:
  name: "vmbr0"
  accept_ra: 2
  autoconf: true
  accept_ra_defrtr: true
  solicit_ra: true
  cleanup_ra_default: false
mwan_ifmgr_host_ipv6_denied_ra_ifaces:
  - "vmbr1"
  - "vmbr2"
  - "vmbr4"
  - "vmbr5"
  - "vmbr6"
  - "vmbrtrunk"

# Cloudflared OOB stays off on suburban (no host OOB tunnel today).

# Suburban DDNS is owned by deploy-testbed.yml.
cfddns_version: "4.4.4"
cfddns_arch_map:
  x86_64: amd64
  aarch64: arm64
  armv7l: armv7
cfddns_deb_arch: "{{ cfddns_arch_map[ansible_architecture] }}"
cfddns_release_base_url: >-
  https://github.com/Zebradil/cloudflare-dynamic-dns/releases/download
cfddns_deb_file: >-
  cloudflare-dynamic-dns_{{ cfddns_version }}_linux_{{ cfddns_deb_arch }}.deb
cfddns_deb_url: >-
  {{ cfddns_release_base_url }}/{{ cfddns_version }}/{{ cfddns_deb_file }}
cfddns_config_dir: /etc/cloudflare-dynamic-dns/config.d
cfddns_timer_dir: /etc/systemd/system
suburban_ddns_ttl: 1
suburban_ddns_ipv4_domains:
  - 128-nj.goodkind.io
suburban_ddns_ipv6_iface: vmbr0
suburban_ddns_ipv6_domains:
  - 128-nj6.goodkind.io
  - hypervisor6.suburban.goodkind.io
suburban_ddns_ipv6_priority_subnets:
  - 3d06:bad:b01::/48

# Testbed-only: ISP LXCs simulating WANs. Consumed by deploy-testbed.yml
# to provision the per-WAN LXCs on suburban. No production equivalent.
# Each entry carries the full capability schema so the shared sim templates
# (kea-dhcp6, radvd, kea-dhcp4) never reference an undefined key. Capabilities:
#   pd_len         : DHCPv6-PD delegation length (prod parity: webpass /56, att
#                    /60, mbrains /56). NPT uses the first /60 of the delegation.
#   dynamic_v4     : sim runs kea-dhcp4 (DHCPv4) instead of the VM holding static v4
#   ia_na          : sim's kea-dhcp6 hands out IA_NA addresses (not just PD)
#   slaac_prefix   : /64 advertised by radvd with AdvAutonomous on (SLAAC); "" off
#   v4_reservations: kea-dhcp4 host reservations (stable lease by MAC); [] for none
#   static_v4_block: a "routed public" /29 the sim routes to the WAN VM and
#                    masquerades out (models AT&T routing a static block over a
#                    dynamic link); "" disables. static_v4_route_to is the VM
#                    link address the block routes to.
# PD prefixes use the 22/23/24 /56-clean scheme (webpass 2200::/56, att 2300::/60,
# mbrains 2400::/56), kept clear of the 02xx mgmt/LAN/internal/SLAAC space.
testbed_isp_lxcs:
  - id: 200
    name: webpass
    # Models prod Webpass: a static v4 link plus a static /29 (1:1-NAT'd to
    # services) and DHCPv6-PD /56. The sim routes the /29 to the static link.
    pd_prefix: "3d06:bad:b01:2200::/56"
    pd_len: 56
    v4_subnet: "10.240.204.0/24"
    vm950_ll: "fe80::be24:11ff:febe:8eb4"
    dynamic_v4: false
    ia_na: false
    slaac_prefix: ""
    v4_reservations: []
    static_v4_block: "10.241.204.0/29"
    static_v4_route_to: "10.240.204.2"
  - id: 201
    name: att
    pd_prefix: "3d06:bad:b01:2300::/60"
    pd_len: 60
    v4_subnet: "10.240.205.0/24"
    vm950_ll: "fe80::be24:11ff:fec0:d760"
    # Models prod AT&T: a dynamic v4 link (DHCP) pinned stable by a MAC
    # reservation, plus a routed static /29 that AT&T 1:1-NATs to services. The
    # testbed cannot reproduce 802.1X/VLAN, so the link is a direct DHCP NIC.
    dynamic_v4: true
    v4_gateway: "10.240.205.1"
    v4_pool: "10.240.205.100 - 10.240.205.200"
    v4_dns: "1.1.1.1"
    ia_na: false
    slaac_prefix: ""
    v4_reservations:
      - { mac: "BC:24:11:C0:D7:60", addr: "10.240.205.2" }
    static_v4_block: "10.241.205.0/29"
    static_v4_route_to: "10.240.205.2"
  - id: 202
    name: mbrains
    pd_prefix: "3d06:bad:b01:2400::/56"
    pd_len: 56
    v4_subnet: "10.240.206.0/24"
    vm950_ll: "fe80::be24:11ff:fe3d:cecc"
    # Full dynamic parity with prod Monkeybrains: DHCPv4 + DHCPv6 IA_NA + PD + SLAAC.
    # mbrains has no routed static block on prod; it egresses via masquerade.
    dynamic_v4: true
    v4_gateway: "10.240.206.1"
    v4_pool: "10.240.206.100 - 10.240.206.200"
    v4_dns: "1.1.1.1"
    ia_na: true
    slaac_prefix: "3d06:bad:b01:250::/64"
    ia_na_pool: "3d06:bad:b01:250::1000 - 3d06:bad:b01:250::1fff"
    v4_reservations: []
    static_v4_block: ""
    static_v4_route_to: ""

# Testbed-only: testbed failover LXC id used by deploy-testbed.yml
failover_lxc_id: "100"
