---
service_hostname: "{{ service_mapping.tack.hostname }}"
service_ipv6_address: "{{ service_mapping.tack.ipv6 }}/64"
service_mac_address: "bc:24:11:a3:52:17"

tack_domain: "tack.home.goodkind.io"

tack_yugabyte_password: "{{ vault_tack_yugabyte_password }}"
tack_meili_master_key: "{{ vault_tack_meili_master_key }}"
tack_audit_writer_password: "{{ vault_tack_audit_writer_password }}"
tack_audit_reader_password: "{{ vault_tack_audit_reader_password }}"
tack_audit_redactor_password: "{{ vault_tack_audit_redactor_password }}"

# GHCR pull token. Classic PAT with read:packages scope.
ghcr_pull_token: "{{ vault_tack_ghcr_pull_token }}"

# Repo read token. Fine-grained PAT with contents:read on agoodkind/tack, used
# by deploy-tack to fetch docker-compose.yml and the overlays from the SOT.
tack_repo_read_token: "{{ vault_tack_repo_read_token }}"

# /96 carved from the on-link 3d06:bad:b01::/64, NDP-proxied via ndppd so
# container GUAs appear on-link to the upstream router. ndp prefix must
# match the docker subnet.
tack_docker_v6_subnet: "3d06:bad:b01:0:7ac::/96"
tack_docker_v6_gateway: "3d06:bad:b01:0:7ac::1"
tack_ndp_proxy_prefix: "3d06:bad:b01:0:7ac::/96"
