---
# Per-host override for the testbed OPNsense.
#
# The service_mapping plugin sets ansible_host from the `ipv6` field of
# the opnsense_test entry (3d06:bad:b01:211::1), but that address is not
# reachable from this controller. SSH from here lands on 192.168.1.1
# (the testbed LAN address) via a ProxyJump through suburban.
#
# Per Ansible variable precedence, inventory host_vars/* override
# plugin-written host vars. So this file wins over the plugin's
# ansible_host without touching the canonical IPv6 in service_mapping.

ansible_host: 192.168.1.1
