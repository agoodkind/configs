plugin: community.proxmox.proxmox
url: https://[3d06:bad:b01::254]:8006
user: ansible@pam
token_id: ansible-token
token_secret: "{{ (lookup('ansible.builtin.unvault', 'inventory/group_vars/all/vault.yml') | from_yaml).vault_proxmox_token_secret }}"
validate_certs: false
want_facts: true
# Node-host ansible_host comes from inventory/hosts (the static IPv6
# management address). Suppress the plugin's API-derived node IP so the
# static entry stays authoritative.
want_proxmox_nodes_ansible_host: false
# Include stopped guests too so playbooks can start them (e.g. prep-guests).
# (We rely on best-effort start + wait_for_connection to handle boot time.)
compose:
  ansible_host: >-
    (proxmox_ipconfig0.ip6 if proxmox_ipconfig0 is defined
    else proxmox_net0.ip6) | ansible.utils.ipaddr('address')
  ansible_proxmox_host: proxmox_node
  ansible_proxmox_vmid: proxmox_vmid
  proxmox_vmtype: proxmox_type
keyed_groups:
  - key: proxmox_tags_parsed
    separator: ""
    prefix: tag
groups:
  proxmox: true
  proxmox_all_lxc: "proxmox_type == 'lxc'"
  proxmox_all_qemu: "proxmox_type == 'qemu'"
